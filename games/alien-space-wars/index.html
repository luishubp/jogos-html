<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tower Defense</title>
<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}
canvas {
    background: #222;
    border: 2px solid white;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>🛡️ Tower Defense</h1>
<p>Dinheiro: <span id="money">100</span> | Vida: <span id="life">10</span></p>
<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let money = 100;
let life = 10;
let enemies = [];
let towers = [];
let bullets = [];
let wave = 0;

// caminho fixo
const path = [
    {x:0,y:200},
    {x:200,y:200},
    {x:200,y:100},
    {x:400,y:100},
    {x:400,y:300},
    {x:600,y:300}
];

function spawnWave() {
    wave++;
    for(let i=0;i<wave*5;i++){
        enemies.push({
            x:0,
            y:200,
            hp: 50 + wave*10,
            speed: 1 + wave*0.1,
            pathIndex: 0
        });
    }
}

canvas.addEventListener("click", (e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if(money >= 50){
        towers.push({x,y,range:100,cooldown:0});
        money -= 50;
    }
});

function update(){
    document.getElementById("money").textContent = money;
    document.getElementById("life").textContent = life;

    // inimigos
    enemies.forEach((enemy, i)=>{
        let target = path[enemy.pathIndex+1];
        if(target){
            let dx = target.x - enemy.x;
            let dy = target.y - enemy.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 2){
                enemy.pathIndex++;
            } else {
                enemy.x += dx/dist * enemy.speed;
                enemy.y += dy/dist * enemy.speed;
            }
        } else {
            life--;
            enemies.splice(i,1);
        }
    });

    // torres
    towers.forEach(tower=>{
        if(tower.cooldown > 0) tower.cooldown--;

        let target = enemies.find(e=>{
            let dx = e.x - tower.x;
            let dy = e.y - tower.y;
            return Math.sqrt(dx*dx + dy*dy) < tower.range;
        });

        if(target && tower.cooldown === 0){
            bullets.push({
                x:tower.x,
                y:tower.y,
                target
            });
            tower.cooldown = 30;
        }
    });

    // balas
    bullets.forEach((b,i)=>{
        if(!b.target) return;

        let dx = b.target.x - b.x;
        let dy = b.target.y - b.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 5){
            b.target.hp -= 20;
            bullets.splice(i,1);
        } else {
            b.x += dx/dist * 5;
            b.y += dy/dist * 5;
        }
    });

    // morte inimigo
    enemies.forEach((e,i)=>{
        if(e.hp <= 0){
            money += 10;
            enemies.splice(i,1);
        }
    });

    if(enemies.length === 0){
        spawnWave();
    }
}

function draw(){
    ctx.clearRect(0,0,600,400);

    // caminho
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    path.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.stroke();

    // torres
    towers.forEach(t=>{
        ctx.fillStyle = "blue";
        ctx.beginPath();
        ctx.arc(t.x,t.y,10,0,Math.PI*2);
        ctx.fill();
    });

    // inimigos
    enemies.forEach(e=>{
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(e.x,e.y,8,0,Math.PI*2);
        ctx.fill();
    });

    // balas
    bullets.forEach(b=>{
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(b.x,b.y,3,0,Math.PI*2);
        ctx.fill();
    });
}

function gameLoop(){
    update();
    draw();
    if(life > 0){
        requestAnimationFrame(gameLoop);
    } else {
        alert("Game Over!");
    }
}

spawnWave();
gameLoop();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>HORROR - Corredor 5</title>
<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}
canvas {
    background: #111;
    border: 2px solid #444;
    margin-top: 10px;
}
button {
    margin: 5px;
    padding: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>👻 CORREDOR 5</h1>
<p>Sanidade: <span id="sanity">100</span>% | Tensão: <span id="fear">0</span>%</p>

<canvas id="game" width="600" height="300"></canvas>

<div>
    <button onclick="action('olhar')">👁️ Olhar corredor</button>
    <button onclick="action('andar')">🚶 Andar</button>
    <button onclick="action('parar')">🧍 Parar</button>
    <button onclick="action('respirar')">🌬️ Respirar</button>
    <button onclick="action('luz')">🔦 Usar lanterna</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let sanity = 100;
let fear = 0;
let lastAction = "";

let entities = [
    {type:"observer", x:100, active:false},
    {type:"shadow", x:300, active:false},
    {type:"echo", x:500, active:false}
];

function action(type){
    lastAction = type;

    if(type === "olhar"){
        fear += 10;
    }
    if(type === "andar"){
        fear -= 5;
    }
    if(type === "parar"){
        sanity -= 2;
    }
    if(type === "respirar"){
        sanity += 5;
        fear -= 5;
    }
    if(type === "luz"){
        fear += 5;
    }

    checkEcho();
}

function checkEcho(){
    let echo = entities.find(e => e.type === "echo");
    if(echo && lastAction === "olhar"){
        sanity -= 10;
    }
}

function updateEntities(){
    entities.forEach(e=>{
        if(e.type === "shadow"){
            e.active = Math.random() < 0.3;
            e.x = Math.random()*600;
        }
        if(e.type === "observer"){
            if(lastAction === "olhar"){
                fear += 5;
            }
        }
    });
}

function update(){
    sanity = Math.max(0, Math.min(100, sanity));
    fear = Math.max(0, Math.min(100, fear));

    document.getElementById("sanity").innerText = sanity;
    document.getElementById("fear").innerText = fear;

    updateEntities();

    fear += 0.2; // tensão constante
    sanity -= fear * 0.01;

    if(sanity <= 0){
        alert("Você perdeu a sanidade...");
        location.reload();
    }
}

function draw(){
    ctx.clearRect(0,0,600,300);

    // corredor
    ctx.fillStyle = "#222";
    ctx.fillRect(0,0,600,300);

    // entidades
    entities.forEach(e=>{
        if(e.type === "observer"){
            ctx.fillStyle = "red";
            ctx.fillText("👁️", e.x, 150);
        }
        if(e.type === "shadow" && e.active){
            ctx.fillStyle = "purple";
            ctx.fillText("🧍", e.x, 200);
        }
        if(e.type === "echo"){
            ctx.fillStyle = "white";
            ctx.fillText("🧠", e.x, 100);
        }
    });

    // glitch efeito simples
    if(fear > 70){
        ctx.fillStyle = "rgba(255,0,0,0.1)";
        ctx.fillRect(0,0,600,300);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>

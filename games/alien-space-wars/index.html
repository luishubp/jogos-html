<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tower Defense - Defenda a Base!</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a472a, #0e2a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #2b2b2b;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid #ffd966;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 0 0 4px #ffd966, 0 10px 25px black;
            cursor: crosshair;
        }

        .info-panel {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: #1e1e1e;
            padding: 12px 20px;
            border-radius: 60px;
            border-left: 6px solid #ffaa33;
        }

        .stats {
            display: flex;
            gap: 25px;
            font-weight: bold;
        }

        .stat {
            background: #000000aa;
            padding: 6px 14px;
            border-radius: 32px;
            backdrop-filter: blur(2px);
            color: #ffecb3;
            font-size: 1.2rem;
        }

        .stat span {
            color: #ffaa33;
            font-size: 1.4rem;
            margin-right: 6px;
        }

        button {
            background: #ffaa33;
            border: none;
            font-weight: bold;
            font-family: inherit;
            font-size: 1rem;
            padding: 8px 18px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #7a4c1a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4c1a;
        }

        .tower-tip {
            background: #2c2c2c;
            border-radius: 32px;
            padding: 5px 12px;
            font-size: 0.75rem;
            color: #ffd58c;
        }

        @media (max-width: 780px) {
            .stat { font-size: 0.9rem; padding: 4px 10px; }
            .info-panel { flex-direction: column; align-items: stretch; border-radius: 24px; }
            button { padding: 10px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
        <div class="info-panel">
            <div class="stats">
                <div class="stat"><span>❤️</span> <span id="livesDisplay">20</span></div>
                <div class="stat"><span>💰</span> <span id="moneyDisplay">350</span></div>
                <div class="stat"><span>🐉</span> <span id="waveDisplay">0</span></div>
                <div class="stat"><span>🗼</span> <span id="towerCount">0</span></div>
            </div>
            <div class="tower-tip">
                🧱 Clique no chão para construir torre (💰120)
            </div>
            <button id="nextWaveBtn">⚔️ PRÓXIMA ONDA ⚔️</button>
        </div>
    </div>
    <div style="text-align: center; margin-top: 12px; font-size: 12px; color: #ffe1a0;">
        Torre atira em inimigos próximos | +💰 por abate | Defenda até o fim!
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- CONFIGURAÇÕES DO MAPA (grid) ----------
        const CELL_W = 30;
        const GRID_W = 30;  // 900/30
        const GRID_H = 18;  // 540/30 (sobra 10px em baixo mas usamos altura 550)
        const PATH_START = { x: 0, y: 8 };   // col 0, row 8
        const PATH_END   = { x: 29, y: 8 };   // col 29, row 8

        // Rota fixa: linha reta no y=8 da esquerda pra direita
        function isPathTile(col, row) {
            return (row === 8 && col >= 0 && col <= 29);
        }

        // ---------- ESTADO DO JOGO ----------
        let lives = 20;
        let money = 350;
        let wave = 0;
        let enemies = [];
        let towers = [];
        let bullets = [];
        let waveInProgress = false;
        let enemiesToSpawn = 0;
        let spawnDelayCounter = 0;
        let waveCompleted = false;
        
        // Torre em construção (mouse hover)
        let hoverTile = null;
        
        // elementos DOM
        const livesSpan = document.getElementById('livesDisplay');
        const moneySpan = document.getElementById('moneyDisplay');
        const waveSpan = document.getElementById('waveDisplay');
        const towerCountSpan = document.getElementById('towerCount');
        const nextWaveBtn = document.getElementById('nextWaveBtn');
        
        // Atualiza interface
        function updateUI() {
            livesSpan.innerText = lives;
            moneySpan.innerText = Math.floor(money);
            waveSpan.innerText = wave;
            towerCountSpan.innerText = towers.length;
        }
        
        // ---------- CLASSES ----------
        class Enemy {
            constructor(x, y, hp, reward, speed, waveNumber) {
                this.x = x;        // pixels
                this.y = y;
                this.hp = hp;
                this.maxHp = hp;
                this.reward = reward;
                this.speed = speed; // pixels por frame ~
                this.size = 24;
                this.waveNum = waveNumber;
            }
            
            draw() {
                // corpo do inimigo (monstro)
                ctx.save();
                ctx.shadowBlur = 0;
                let healthPercent = this.hp / this.maxHp;
                ctx.fillStyle = "#922";
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size/1.8, this.size/1.6, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#d44";
                ctx.beginPath();
                ctx.ellipse(this.x-4, this.y-3, 5, 5, 0, 0, Math.PI*2);
                ctx.ellipse(this.x+4, this.y-3, 5, 5, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.arc(this.x-4, this.y-4, 2, 0, Math.PI*2);
                ctx.arc(this.x+4, this.y-4, 2, 0, Math.PI*2);
                ctx.fill();
                // barra de vida
                ctx.fillStyle = "#111";
                ctx.fillRect(this.x-14, this.y-16, 28, 6);
                ctx.fillStyle = "#4caf50";
                ctx.fillRect(this.x-14, this.y-16, 28 * healthPercent, 5);
                ctx.restore();
            }
            
            update() {
                // movimento ao longo do eixo X (path reto)
                this.x += this.speed;
                // se passou do fim -> dano
                if(this.x >= (PATH_END.x * CELL_W) + 10) {
                    return true; // chegou no fim
                }
                return false;
            }
        }
        
        class Tower {
            constructor(col, row) {
                this.col = col;
                this.row = row;
                this.x = col * CELL_W + CELL_W/2;
                this.y = row * CELL_W + CELL_W/2;
                this.range = 100;
                this.cooldown = 0;
                this.damage = 28;
                this.shootDelayMax = 25; // frames
            }
            
            draw() {
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#6c8cbf";
                ctx.beginPath();
                ctx.rect(this.x-12, this.y-12, 24, 24);
                ctx.fill();
                ctx.fillStyle = "#3a5c8c";
                ctx.beginPath();
                ctx.rect(this.x-6, this.y-6, 12, 12);
                ctx.fill();
                ctx.fillStyle = "#ffd966";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI*2);
                ctx.fill();
                // desenhar alcance (sutil)
                ctx.globalAlpha = 0.15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.range, 0, Math.PI*2);
                ctx.fillStyle = "#aaffdd";
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.restore();
            }
            
            update() {
                if(this.cooldown > 0) this.cooldown--;
                let closest = null;
                let minDist = Infinity;
                for(let i=0; i<enemies.length; i++) {
                    const e = enemies[i];
                    const dx = e.x - this.x;
                    const dy = e.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    if(dist < this.range && dist < minDist) {
                        minDist = dist;
                        closest = e;
                    }
                }
                if(closest && this.cooldown === 0) {
                    // atirar
                    bullets.push({
                        x: this.x,
                        y: this.y,
                        target: closest,
                        damage: this.damage,
                        active: true,
                        range: this.range
                    });
                    this.cooldown = this.shootDelayMax;
                }
            }
        }
        
        // ---------- SISTEMA DE ONDA ----------
        function startWave(waveNumber) {
            if(waveInProgress) return;
            waveInProgress = true;
            waveCompleted = false;
            let baseCount = 5 + Math.floor(waveNumber * 1.3);
            if(baseCount > 22) baseCount = 22 + Math.floor(waveNumber/5);
            enemiesToSpawn = baseCount;
            spawnDelayCounter = 0;
            enemies = [];
        }
        
        function spawnEnemyIfNeeded() {
            if(!waveInProgress) return;
            if(enemiesToSpawn <= 0 && enemies.length === 0) {
                // onda finalizada
                waveInProgress = false;
                waveCompleted = true;
                wave++;
                updateUI();
                // dar bônus por sobreviver
                let bonus = 150 + wave * 12;
                money += bonus;
                updateUI();
                return;
            }
            if(enemiesToSpawn > 0) {
                if(spawnDelayCounter <= 0) {
                    // spawn inimigo
                    let hpBase = 30 + wave * 9;
                    let rewardBase = 60 + wave * 4;
                    let spd = 1.2 + Math.min(wave * 0.08, 2.2);
                    let enemy = new Enemy(
                        PATH_START.x * CELL_W + 5, 
                        PATH_START.y * CELL_W + CELL_W/2 - 4,
                        Math.floor(hpBase),
                        Math.floor(rewardBase),
                        spd,
                        wave
                    );
                    enemies.push(enemy);
                    enemiesToSpawn--;
                    spawnDelayCounter = 28; // frames entre spawns
                } else {
                    spawnDelayCounter--;
                }
            }
        }
        
        // ---------- ATUALIZAÇÕES GLOBAIS ----------
        function updateGame() {
            if(!waveInProgress && !waveCompleted && wave === 0) {
                // primeira onda automática
                startWave(1);
            }
            
            spawnEnemyIfNeeded();
            
            // atualizar inimigos
            for(let i=enemies.length-1; i>=0; i--) {
                const e = enemies[i];
                const reachedEnd = e.update();
                if(reachedEnd) {
                    enemies.splice(i,1);
                    lives--;
                    updateUI();
                    if(lives <= 0) {
                        alert("💀 GAME OVER 💀\nVocê foi invadido! Recarregue a página para tentar novamente.");
                        lives = 0;
                        waveInProgress = false;
                        enemies = [];
                        bullets = [];
                        updateUI();
                        return;
                    }
                    continue;
                }
                // se hp <=0
                if(e.hp <= 0) {
                    money += e.reward;
                    enemies.splice(i,1);
                    updateUI();
                }
            }
            
            // torres atiram
            for(let t of towers) {
                t.update();
            }
            
            // projéteis
            for(let i=0; i<bullets.length; i++) {
                const b = bullets[i];
                if(!b.target || b.target.hp <= 0) {
                    bullets.splice(i,1);
                    i--;
                    continue;
                }
                // mover pro alvo
                const dx = b.target.x - b.x;
                const dy = b.target.y - b.y;
                const dist = Math.hypot(dx,dy);
                if(dist < 12 || dist > b.range+30) {
                    // acertou
                    b.target.hp -= b.damage;
                    bullets.splice(i,1);
                    i--;
                } else {
                    const step = 12;
                    b.x += (dx / dist) * step;
                    b.y += (dy / dist) * step;
                }
            }
            
            // re-aplicar vida negativa nos inimigos mortos
            for(let i=0;i<enemies.length;i++){
                if(enemies[i].hp<=0){
                    money += enemies[i].reward;
                    enemies.splice(i,1);
                    i--;
                    updateUI();
                }
            }
        }
        
        // ---------- CONSTRUÇÃO DE TORRES ----------
        function tryPlaceTower(col, row) {
            if(waveInProgress) {
                // evita construir durante onda (desafio)
                return false;
            }
            if(isPathTile(col, row)) return false;
            // ver se já tem torre
            for(let t of towers) {
                if(t.col === col && t.row === row) return false;
            }
            const cost = 120;
            if(money >= cost) {
                towers.push(new Tower(col, row));
                money -= cost;
                updateUI();
                return true;
            } else {
                return false;
            }
        }
        
        // ---------- EVENTOS DO MOUSE ----------
        function getMouseTile(mouseX, mouseY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (mouseX - rect.left) * scaleX;
            let canvasY = (mouseY - rect.top) * scaleY;
            if(canvasX < 0 || canvasY < 0) return null;
            const col = Math.floor(canvasX / CELL_W);
            const row = Math.floor(canvasY / CELL_W);
            if(col>=0 && col<GRID_W && row>=0 && row<GRID_H) return {col, row};
            return null;
        }
        
        canvas.addEventListener('mousemove', (e) => {
            const tile = getMouseTile(e.clientX, e.clientY);
            if(tile && !isPathTile(tile.col, tile.row) && !waveInProgress) {
                let occupied = towers.some(t => t.col === tile.col && t.row === tile.row);
                if(!occupied) hoverTile = tile;
                else hoverTile = null;
            } else {
                hoverTile = null;
            }
        });
        
        canvas.addEventListener('click', (e) => {
            if(waveInProgress) return; // só constrói entre ondas
            const tile = getMouseTile(e.clientX, e.clientY);
            if(tile) {
                tryPlaceTower(tile.col, tile.row);
            }
        });
        
        nextWaveBtn.addEventListener('click', () => {
            if(!waveInProgress && waveCompleted === true) {
                startWave(wave+1);
                waveCompleted = false;
                updateUI();
            } else if(!waveInProgress && wave === 0){
                startWave(1);
                updateUI();
            } else if(waveInProgress){
                // só aviso silencioso
            } else if(waveCompleted === false && !waveInProgress && towers.length >0){
                startWave(wave+1);
            }
        });
        
        // ---------- DESENHO DO CENÁRIO ----------
        function drawMap() {
            for(let row=0; row<GRID_H; row++) {
                for(let col=0; col<GRID_W; col++) {
                    let x = col*CELL_W;
                    let y = row*CELL_W;
                    if(isPathTile(col, row)) {
                        ctx.fillStyle = "#8b5a2b";
                        ctx.fillRect(x, y, CELL_W-1, CELL_W-1);
                        ctx.fillStyle = "#c98a3e";
                        ctx.fillRect(x+2, y+2, CELL_W-5, CELL_W-5);
                    } else {
                        ctx.fillStyle = "#3a6b47";
                        ctx.fillRect(x, y, CELL_W-1, CELL_W-1);
                        ctx.fillStyle = "#2b5236";
                        ctx.fillRect(x+1, y+1, CELL_W-3, CELL_W-3);
                    }
                    // grade sutil
                    ctx.strokeStyle = "#6f9e7c";
                    ctx.strokeRect(x, y, CELL_W, CELL_W);
                }
            }
            // início e fim decorativo
            ctx.font = "bold 20 monospace";
            ctx.fillStyle = "#ffbc6e";
            ctx.shadowBlur = 0;
            ctx.fillText("🏁", 5, PATH_START.y*CELL_W+22);
            ctx.fillText("🏰", PATH_END.x*CELL_W+8, PATH_END.y*CELL_W+22);
        }
        
        function drawHover() {
            if(hoverTile && !waveInProgress && money>=120) {
                ctx.fillStyle = "#99ffcc88";
                ctx.fillRect(hoverTile.col*CELL_W, hoverTile.row*CELL_W, CELL_W-1, CELL_W-1);
                ctx.fillStyle = "#ffffffcc";
                ctx.font="bold 13px monospace";
                ctx.fillText("💰120", hoverTile.col*CELL_W+5, hoverTile.row*CELL_W+18);
            } else if(hoverTile && money<120) {
                ctx.fillStyle = "#ff888888";
                ctx.fillRect(hoverTile.col*CELL_W, hoverTile.row*CELL_W, CELL_W-1, CELL_W-1);
            }
        }
        
        function drawBullets() {
            for(let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "#ffaa44";
                ctx.fill();
                ctx.fillStyle = "orange";
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        // ---------- ANIMAÇÃO PRINCIPAL ----------
        function animate() {
            if(lives > 0) {
                updateGame();
            }
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawMap();
            for(let t of towers) t.draw();
            for(let e of enemies) e.draw();
            drawBullets();
            drawHover();
            
            if(!waveInProgress && waveCompleted && lives>0) {
                ctx.font = "bold 28monospace";
                ctx.fillStyle = "#ffec80";
                ctx.shadowBlur = 0;
                ctx.fillText("✔️ PRESSIONE PRÓXIMA ONDA", canvas.width/2-180, 50);
            }
            if(waveInProgress && enemiesToSpawn>0 && lives>0){
                ctx.font = "16px monospace";
                ctx.fillStyle = "#f7d44a";
                ctx.fillText(`Inimigos restantes: ${enemiesToSpawn + enemies.length}`, 20, 40);
            }
            requestAnimationFrame(animate);
        }
        
        // Inicialização
        updateUI();
        animate();
        // Onda inicial ativada com delay amigável
        setTimeout(()=>{
            if(!waveInProgress && wave===0){
                startWave(1);
            }
        }, 800);
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Defense - Gemini AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 10px 0;
            text-shadow: 0 0 10px #0ff;
        }

        #ui-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            background: #111;
            padding: 10px 20px;
            border: 1px solid #0ff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .stat {
            font-size: 18px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            background: #222;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 8px 16px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 10px #0ff;
        }

        button.active {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 15px #0ff;
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            background: #222;
        }

        canvas {
            background-color: #0a0a1a;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            cursor: crosshair;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #f00;
            padding: 40px;
            text-align: center;
            color: #f00;
            display: none;
            box-shadow: 0 0 30px #f00;
        }
    </style>
</head>
<body>

    <h1>NEON DEFENSE</h1>
    
    <div id="ui-panel">
        <div class="stat">💰 Créditos: <span id="money">150</span></div>
        <div class="stat">💖 Núcleo: <span id="lives">10</span></div>
        <div class="stat">🌊 Onda: <span id="wave">1</span></div>
    </div>

    <div class="controls">
        <button id="btn-tower1" class="active" onclick="selectTowerType(1)">Torre Laser (50💰)</button>
        <button id="btn-tower2" onclick="selectTowerType(2)">Canhão Plasma (100💰)</button>
        <button id="btn-start" onclick="startWave()">Iniciar Onda</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="game-over">
        <h2>SISTEMA COMPROMETIDO</h2>
        <p>O núcleo foi destruído.</p>
        <button onclick="location.reload()">Reiniciar Sistema</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Elementos da UI
        const moneyEl = document.getElementById('money');
        const livesEl = document.getElementById('lives');
        const waveEl = document.getElementById('wave');
        const btnStart = document.getElementById('btn-start');
        
        // Configurações do Jogo
        const CELL_SIZE = 50;
        let money = 150;
        let lives = 10;
        let wave = 1;
        let gameOver = false;
        let waveActive = false;
        
        let enemies = [];
        let towers = [];
        let bullets = [];
        let particles = [];
        
        let selectedTowerType = 1;
        let spawnInterval = null;
        let enemiesToSpawn = 0;
        let enemySpawnCounter = 0;

        // Caminho dos inimigos (Coordenadas Centrais das Células)
        const path = [
            {x: -25, y: 75}, {x: 625, y: 75}, {x: 625, y: 275}, 
            {x: 175, y: 275}, {x: 175, y: 475}, {x: 825, y: 475}
        ];

        // Tipos de Torres
        const TOWER_TYPES = {
            1: { cost: 50, range: 120, damage: 15, cooldown: 30, color: '#0f0', name: 'Laser' },
            2: { cost: 100, range: 200, damage: 40, cooldown: 80, color: '#f0f', name: 'Plasma' }
        };

        // Funções de UI
        function updateUI() {
            moneyEl.innerText = money;
            livesEl.innerText = lives;
            waveEl.innerText = wave;
            if (lives <= 0) endGame();
        }

        function selectTowerType(type) {
            selectedTowerType = type;
            document.getElementById('btn-tower1').classList.remove('active');
            document.getElementById('btn-tower2').classList.remove('active');
            document.getElementById(`btn-tower${type}`).classList.add('active');
        }

        // Classes do Jogo
        class Enemy {
            constructor(hp, speed) {
                this.x = path[0].x;
                this.y = path[0].y;
                this.hp = hp;
                this.maxHp = hp;
                this.speed = speed;
                this.waypointIndex = 1;
                this.radius = 12;
                this.reward = 10;
            }

            update() {
                const target = path[this.waypointIndex];
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.hypot(dx, dy);

                if (dist < this.speed) {
                    this.x = target.x;
                    this.y = target.y;
                    this.waypointIndex++;
                    if (this.waypointIndex >= path.length) {
                        lives--;
                        updateUI();
                        return false; // Chegou ao fim
                    }
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
                return true; // Continua vivo
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#f00';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f00';
                ctx.fill();
                ctx.shadowBlur = 0; // Reset

                // Barra de Vida
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
                ctx.fillStyle = '#0f0';
                ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
            }
        }

        class Tower {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.range = TOWER_TYPES[type].range;
                this.damage = TOWER_TYPES[type].damage;
                this.cooldown = TOWER_TYPES[type].cooldown;
                this.color = TOWER_TYPES[type].color;
                this.currentCooldown = 0;
                this.angle = 0;
            }

            update() {
                if (this.currentCooldown > 0) this.currentCooldown--;

                let target = null;
                let minDist = this.range;

                // Encontrar inimigo mais próximo
                for (let enemy of enemies) {
                    const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                    if (dist < minDist) {
                        minDist = dist;
                        target = enemy;
                    }
                }

                if (target) {
                    this.angle = Math.atan2(target.y - this.y, target.x - this.x);
                    if (this.currentCooldown === 0) {
                        this.fire(target);
                        this.currentCooldown = this.cooldown;
                    }
                }
            }

            fire(target) {
                bullets.push(new Bullet(this.x, this.y, target, this.damage, this.color));
            }

            draw() {
                // Base
                ctx.beginPath();
                ctx.arc(this.x, this.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#222';
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fill();

                // Canhão giratório
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                ctx.moveTo(0, -5);
                ctx.lineTo(20, -5);
                ctx.lineTo(20, 5);
                ctx.lineTo(0, 5);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, target, damage, color) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.damage = damage;
                this.color = color;
                this.speed = 8;
                this.radius = 4;
            }

            update() {
                // Se o alvo morreu enquanto a bala estava no ar, apenas siga em frente
                if (!enemies.includes(this.target)) {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                    return this.x > 0 && this.x < canvas.width && this.y > 0 && this.y < canvas.height;
                }

                this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Colisão
                const dist = Math.hypot(this.target.x - this.x, this.target.y - this.y);
                if (dist < this.target.radius + this.radius) {
                    this.target.hp -= this.damage;
                    createParticles(this.x, this.y, this.color);
                    return false; // Destrói a bala
                }
                return true;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.life = 20;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                return this.life > 0;
            }
            draw() {
                ctx.globalAlpha = this.life / 20;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 3, 3);
                ctx.globalAlpha = 1.0;
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<5; i++) particles.push(new Particle(x, y, color));
        }

        // Lógica de Construção de Torres
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Encaixar na grade
            const gridX = Math.floor(mouseX / CELL_SIZE) * CELL_SIZE + CELL_SIZE / 2;
            const gridY = Math.floor(mouseY / CELL_SIZE) * CELL_SIZE + CELL_SIZE / 2;

            // Verificar se tem dinheiro
            const towerDef = TOWER_TYPES[selectedTowerType];
            if (money < towerDef.cost) return;

            // Verificar se está em cima do caminho
            let onPath = false;
            for (let i = 0; i < path.length - 1; i++) {
                const p1 = path[i];
                const p2 = path[i+1];
                const minX = Math.min(p1.x, p2.x) - 25;
                const maxX = Math.max(p1.x, p2.x) + 25;
                const minY = Math.min(p1.y, p2.y) - 25;
                const maxY = Math.max(p1.y, p2.y) + 25;

                if (gridX > minX && gridX < maxX && gridY > minY && gridY < maxY) {
                    onPath = true;
                    break;
                }
            }
            if (onPath) return;

            // Verificar se já tem torre no local
            for (let t of towers) {
                if (t.x === gridX && t.y === gridY) return;
            }

            // Construir
            money -= towerDef.cost;
            towers.push(new Tower(gridX, gridY, selectedTowerType));
            updateUI();
        });

        // Loop e Desenho do Cenário
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar Caminho Neon
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }
            ctx.strokeStyle = '#223';
            ctx.lineWidth = 40;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Linha central brilhante
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0ff';
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Sistema de Ondas
        function startWave() {
            if (waveActive || gameOver) return;
            waveActive = true;
            btnStart.disabled = true;
            enemiesToSpawn = 5 + (wave * 3);
            let hpScale = 50 + (wave * 20);
            
            spawnInterval = setInterval(() => {
                enemies.push(new Enemy(hpScale, 1.5 + (wave * 0.1)));
                enemiesToSpawn--;
                if (enemiesToSpawn <= 0) {
                    clearInterval(spawnInterval);
                }
            }, 1000 - (wave * 20 > 500 ? 500 : wave * 20)); // Fica mais rápido o spawn
        }

        function checkWaveEnd() {
            if (waveActive && enemiesToSpawn <= 0 && enemies.length === 0) {
                waveActive = false;
                wave++;
                money += 50; // Bonus por passar de onda
                btnStart.disabled = false;
                updateUI();
            }
        }

        function endGame() {
            gameOver = true;
            document.getElementById('game-over').style.display = 'block';
            clearInterval(spawnInterval);
        }

        // Game Loop Principal
        function gameLoop() {
            if (!gameOver) {
                drawMap();

                // Atualizar e Desenhar Torres
                for (let tower of towers) {
                    tower.update();
                    tower.draw();
                }

                // Atualizar e Desenhar Balas
                for (let i = bullets.length - 1; i >= 0; i--) {
                    if (!bullets[i].update()) {
                        bullets.splice(i, 1);
                    } else {
                        bullets[i].draw();
                    }
                }

                // Atualizar e Desenhar Inimigos
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (enemies[i].hp <= 0) {
                        money += enemies[i].reward;
                        createParticles(enemies[i].x, enemies[i].y, '#f00');
                        enemies.splice(i, 1);
                        updateUI();
                    } else if (!enemies[i].update()) {
                        enemies.splice(i, 1); // Chegou no fim
                    } else {
                        enemies[i].draw();
                    }
                }

                // Partículas
                for (let i = particles.length - 1; i >= 0; i--) {
                    if (!particles[i].update()) {
                        particles.splice(i, 1);
                    } else {
                        particles[i].draw();
                    }
                }

                checkWaveEnd();
            }
            requestAnimationFrame(gameLoop);
        }

        // Iniciar
        updateUI();
        gameLoop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Vigília - Horror</title>
    <style>
        /* CSS: A Atmosfera de Horror */
        :root {
            --bg-color: #050505;
            --crt-green: #2ecc71;
            --crt-dark: #1a4f2e;
            --danger: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--crt-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Efeito CRT (Monitor Antigo) */
        #game-container {
            width: 800px;
            height: 600px;
            background: #0a0a0a;
            border: 4px solid #222;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #monitor {
            flex: 2;
            border-bottom: 2px solid var(--crt-dark);
            position: relative;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(46,204,113,0.05) 2px, rgba(46,204,113,0.05) 4px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            text-align: center;
        }

        #controls {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .bar-container { margin-bottom: 10px; }
        progress { width: 100%; height: 20px; accent-color: var(--crt-green); }
        progress.danger { accent-color: var(--danger); }

        button {
            background: #111;
            color: var(--crt-green);
            border: 1px solid var(--crt-green);
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        button:hover { background: var(--crt-dark); }
        button:active { background: var(--crt-green); color: #000; }
        
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        /* Inimigo 1: Efeito do Ruído (Glitch) */
        .glitch-active {
            animation: glitch-anim 0.2s infinite;
            filter: contrast(2) hue-rotate(90deg);
        }

        @keyframes glitch-anim {
            0% { transform: translate(2px, 1px); }
            20% { transform: translate(-2px, -2px); }
            40% { transform: translate(1px, 2px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(3px, 1px); }
            100% { transform: translate(-1px, 2px); }
        }

        /* Inimigo 2: Visão Térmica */
        .thermal-vision #monitor { background: #800000; color: #ffcccc; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: red; display: none;
            justify-content: center; align-items: center; font-size: 40px; z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="monitor">
        <span id="camera-text">CÂMARA 01 - SALA DE SERVIDORES<br>[SISTEMA ESTÁVEL]</span>
    </div>

    <div id="controls">
        <div>
            <div class="bar-container">ENERGIA <progress id="energia" value="100" max="100"></progress></div>
            <div class="bar-container">SANIDADE <progress id="sanidade" value="100" max="100"></progress></div>
            <label>SINTONIZAR RÁDIO:</label>
            <input type="range" id="radio-sync" min="0" max="100" value="50" style="width: 100%;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button onclick="trocarCamara()">MUDAR CÂMARA</button>
            <button id="btn-thermal" onclick="toggleTermal()">LIGAR VISÃO TÉRMICA</button>
            <button id="btn-valve" onmousedown="segurarValvula()" onmouseup="soltarValvula()" onmouseleave="soltarValvula()">SEGURAR VÁLVULA</button>
            <button id="btn-degauss" onclick="usarDegauss()" style="display: none; border-color: red; color: red;">DEGAUSS (PURGAR SISTEMA)</button>
        </div>
    </div>

    <div id="game-over">FIM DE TRANSMISSÃO</div>
</div>

<script>
    // === ESTADO DO JOGO ===
    const state = {
        energia: 100,
        sanidade: 100,
        camaraAtual: 1,
        visaoTermica: false,
        valvulaSegurada: false,
        jogoAvoar: true,
        frequenciaRuptura: Math.floor(Math.random() * 100) // Frequência perigosa do rádio
    };

    // === INIMIGOS ===
    const inimigos = {
        ruido: { ativo: false, timer: 0 },
        andarilho: { ativo: false, progressoInvasao: 0 },
        mimetizador: { ativo: false, somFalsoTocado: false }
    };

    // Elementos DOM
    const UI = {
        monitor: document.getElementById('monitor'),
        textoCam: document.getElementById('camera-text'),
        energia: document.getElementById('energia'),
        sanidade: document.getElementById('sanidade'),
        container: document.getElementById('game-container'),
        btnDegauss: document.getElementById('btn-degauss'),
        radioSync: document.getElementById('radio-sync'),
        btnTermal: document.getElementById('btn-thermal')
    };

    // === SISTEMA DE ÁUDIO (Web Audio API - Sem ficheiros externos) ===
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarBeep(frequencia, tipo = 'sine', duracao = 0.1) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = tipo; osc.frequency.value = frequencia;
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duracao);
        setTimeout(() => osc.stop(), duracao * 1000);
    }

    // === MECÂNICAS ===
    function trocarCamara() {
        if (!state.jogoAvoar) return;
        
        // Punição do Inimigo 3 (Mimetizador)
        if (inimigos.mimetizador.somFalsoTocado) {
            alterarAtributo('sanidade', -20);
            UI.textoCam.innerHTML = "FOSTE ENGANADO.<br>ELE ESTÁ A OBSERVAR.";
            inimigos.mimetizador.somFalsoTocado = false;
            return;
        }

        state.camaraAtual = state.camaraAtual === 1 ? 2 : 1;
        atualizarEcra();
        alterarAtributo('energia', -2);
        tocarBeep(800, 'square', 0.05);
    }

    function toggleTermal() {
        state.visaoTermica = !state.visaoTermica;
        UI.btnTermal.innerText = state.visaoTermica ? "DESLIGAR TÉRMICA" : "LIGAR VISÃO TÉRMICA";
        atualizarEcra();
    }

    function segurarValvula() { state.valvulaSegurada = true; }
    function soltarValvula() { state.valvulaSegurada = false; }

    function usarDegauss() {
        if (inimigos.ruido.ativo) {
            inimigos.ruido.ativo = false;
            inimigos.ruido.timer = 0;
            UI.container.classList.remove('glitch-active');
            UI.btnDegauss.style.display = 'none';
            alterarAtributo('energia', -15); // Custa muita energia
            tocarBeep(200, 'sawtooth', 0.5);
            atualizarEcra();
        }
    }

    function alterarAtributo(attr, valor) {
        state[attr] += valor;
        if (state[attr] > 100) state[attr] = 100;
        if (state[attr] < 0) state[attr] = 0;
        UI[attr].value = state[attr];
        
        if (state.sanidade <= 30) UI.sanidade.classList.add('danger');
        else UI.sanidade.classList.remove('danger');

        if (state.energia <= 0 || state.sanidade <= 0) gameOver("FALHA NOS SISTEMAS VITAIS");
    }

    function atualizarEcra() {
        if (state.visaoTermica) {
            UI.container.classList.add('thermal-vision');
            if (state.camaraAtual === 2 && inimigos.andarilho.ativo) {
                UI.textoCam.innerHTML = "CÂMARA 02 - DUTOS<br>!!! ASSINATURA DE CALOR DETETADA !!!";
            } else {
                UI.textoCam.innerHTML = `CÂMARA 0${state.camaraAtual} - TÉRMICA<br>Limpo.`;
            }
        } else {
            UI.container.classList.remove('thermal-vision');
            UI.textoCam.innerHTML = `CÂMARA 0${state.camaraAtual} - VISÃO NORMAL<br>Sem anomalias visíveis.`;
        }
    }

    // === GAME LOOP PRINCIPAL ===
    setInterval(() => {
        if (!state.jogoAvoar) return;

        // Dreno constante
        alterarAtributo('energia', state.visaoTermica ? -2 : -0.5);

        // Mecânica do Rádio (Sintonia perigosa)
        const diffRádio = Math.abs(UI.radioSync.value - state.frequenciaRuptura);
        if (diffRádio < 5) {
            alterarAtributo('sanidade', -5);
            tocarBeep(100 + Math.random() * 50, 'sawtooth', 0.2); // Som perturbador
        }

        // Lógica Inimigo 1: O Ruído
        if (!inimigos.ruido.ativo && Math.random() < 0.05) {
            inimigos.ruido.ativo = true;
            UI.container.classList.add('glitch-active');
            UI.btnDegauss.style.display = 'block';
            tocarBeep(50, 'square', 1);
        }
        if (inimigos.ruido.ativo) {
            inimigos.ruido.timer++;
            alterarAtributo('sanidade', -2);
            if (inimigos.ruido.timer > 10) gameOver("O RUÍDO CONSUMIU O TEU CÓDIGO.");
        }

        // Lógica Inimigo 2: Andarilho Térmico
        if (!inimigos.andarilho.ativo && Math.random() < 0.08) {
            inimigos.andarilho.ativo = true;
        }
        if (inimigos.andarilho.ativo) {
            if (!state.valvulaSegurada) inimigos.andarilho.progressoInvasao += 10;
            else inimigos.andarilho.progressoInvasao -= 15; // Recua se segurar

            if (inimigos.andarilho.progressoInvasao < 0) {
                inimigos.andarilho.ativo = false; // Espantado
                inimigos.andarilho.progressoInvasao = 0;
                atualizarEcra();
            }
            if (inimigos.andarilho.progressoInvasao >= 100) gameOver("O ANDARILHO ENTROU PELOS DUTOS.");
        }

        // Lógica Inimigo 3: Mimetizador (Notificação falsa)
        if (!inimigos.mimetizador.ativo && Math.random() < 0.04) {
            inimigos.mimetizador.somFalsoTocado = true;
            tocarBeep(800, 'square', 0.05); // Toca o exato mesmo som de trocar câmara
            setTimeout(() => { inimigos.mimetizador.somFalsoTocado = false; }, 3000); // 3 segundos para ignorar
        }

    }, 1000);

    function gameOver(motivo) {
        state.jogoAvoar = false;
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('game-over').innerHTML = `${motivo}<br><br><button onclick="location.reload()" style="font-size:20px; padding:15px;">REINICIAR PROTOCOLO</button>`;
        tocarBeep(40, 'sawtooth', 3);
    }
</script>

</body>
</html>

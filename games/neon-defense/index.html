<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — Tower Defense</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #060a0f;
    --panel: #0b1320;
    --border: #1a2d4a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff00;
    --danger: #ff2244;
    --gold: #ffd700;
    --text: #b0cce8;
    --glow: 0 0 12px #00d4ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    width: 100%;
    padding: 10px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .hud {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .hud-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #0a1525;
  }

  .hud-item .val {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 1rem;
  }

  .hud-item.lives .val { color: var(--danger); }
  .hud-item.gold .val { color: var(--gold); }
  .hud-item.wave .val { color: var(--accent); }
  .hud-item.score .val { color: var(--accent3); }

  .main {
    display: flex;
    gap: 16px;
    padding: 16px;
    align-items: flex-start;
    width: 100%;
    max-width: 1100px;
  }

  #gameCanvas {
    border: 1px solid var(--border);
    box-shadow: 0 0 30px #00d4ff22;
    cursor: crosshair;
    flex-shrink: 0;
    display: block;
  }

  .sidebar {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }

  .panel-box h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .tower-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #0a1525;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    text-align: left;
  }

  .tower-btn:hover {
    border-color: var(--accent);
    background: #0d1e35;
    box-shadow: var(--glow);
  }

  .tower-btn.selected {
    border-color: var(--accent);
    background: #0d2040;
    box-shadow: var(--glow);
  }

  .tower-btn .icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .tower-btn .info { flex: 1; }
  .tower-btn .name { font-size: 0.8rem; color: #fff; margin-bottom: 2px; }
  .tower-btn .stats { font-size: 0.68rem; color: #567a9a; }
  .tower-btn .cost { font-size: 0.85rem; color: var(--gold); font-family: 'Orbitron', monospace; }

  .btn-action {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #0a1525;
    color: var(--text);
    cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    transition: all 0.15s;
    margin-bottom: 6px;
  }

  .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  .btn-action.start { border-color: var(--accent3); color: var(--accent3); }
  .btn-action.start:hover { background: #0a2500; box-shadow: 0 0 12px #7fff0055; }
  .btn-action.sell { border-color: var(--gold); color: var(--gold); }

  .info-box {
    font-size: 0.75rem;
    line-height: 1.7;
    color: #567a9a;
  }

  .info-box .highlight { color: var(--accent); }

  #msgOverlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(6,10,15,0.96);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 40px 60px;
    text-align: center;
    z-index: 100;
    box-shadow: 0 0 60px #00d4ff44;
    display: none;
  }

  #msgOverlay h2 {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 12px;
    text-shadow: var(--glow);
  }

  #msgOverlay p { color: var(--text); margin-bottom: 24px; font-size: 0.9rem; }

  #msgOverlay button {
    padding: 12px 36px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  #msgOverlay button:hover { background: var(--accent); color: var(--bg); }

  .wave-announce {
    position: absolute;
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent2);
    text-shadow: 0 0 20px #ff6b3588;
    pointer-events: none;
    opacity: 0;
    animation: waveAnnounce 2s ease forwards;
    white-space: nowrap;
  }

  @keyframes waveAnnounce {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
  }

  #canvasWrap {
    position: relative;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>◈ SENTINEL</h1>
  <div class="hud">
    <div class="hud-item lives">❤️ <span class="val" id="livesVal">20</span></div>
    <div class="hud-item gold">💰 <span class="val" id="goldVal">150</span></div>
    <div class="hud-item wave">⚡ WAVE <span class="val" id="waveVal">0</span></div>
    <div class="hud-item score">★ <span class="val" id="scoreVal">0</span></div>
  </div>
</header>

<div class="main">
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="720" height="500"></canvas>
  </div>

  <div class="sidebar">
    <div class="panel-box">
      <h3>Torres</h3>
      <button class="tower-btn" id="btn-basic" onclick="selectTower('basic')">
        <div class="icon" style="background:#0d2a3a;border:2px solid #00d4ff;">🔵</div>
        <div class="info">
          <div class="name">PULSE</div>
          <div class="stats">DMG 20 | VEL MÉDIA | ALC MÉDIO</div>
        </div>
        <div class="cost">50</div>
      </button>
      <button class="tower-btn" id="btn-sniper" onclick="selectTower('sniper')">
        <div class="icon" style="background:#2a1a0d;border:2px solid #ff6b35;">🔶</div>
        <div class="info">
          <div class="name">RAILGUN</div>
          <div class="stats">DMG 80 | VEL LENTA | ALC ALTO</div>
        </div>
        <div class="cost">100</div>
      </button>
      <button class="tower-btn" id="btn-splash" onclick="selectTower('splash')">
        <div class="icon" style="background:#1a2a0d;border:2px solid #7fff00;">🟢</div>
        <div class="info">
          <div class="name">NOVA</div>
          <div class="stats">DMG 30 | ÁREA | ALC MÉDIO</div>
        </div>
        <div class="cost">125</div>
      </button>
      <button class="tower-btn" id="btn-freeze" onclick="selectTower('freeze')">
        <div class="icon" style="background:#0d1a2a;border:2px solid #88ccff;">❄️</div>
        <div class="info">
          <div class="name">CRYO</div>
          <div class="stats">LENTO | VEL ALTA | ALC MÉDIO</div>
        </div>
        <div class="cost">80</div>
      </button>
    </div>

    <div class="panel-box">
      <h3>Controles</h3>
      <button class="btn-action start" id="startBtn" onclick="startWave()">▶ INICIAR WAVE</button>
      <button class="btn-action" onclick="selectTower(null)">✕ CANCELAR</button>
      <button class="btn-action sell" onclick="sellMode()">$ VENDER TORRE</button>
    </div>

    <div class="panel-box">
      <h3>Info</h3>
      <div class="info-box" id="infoBox">
        Selecione uma torre e clique no mapa para posicioná-la.<br><br>
        <span class="highlight">PULSE</span> — balanceada<br>
        <span class="highlight">RAILGUN</span> — alto dano<br>
        <span class="highlight">NOVA</span> — área/splash<br>
        <span class="highlight">CRYO</span> — congela inimigos<br><br>
        Não coloque torres no caminho!
      </div>
    </div>
  </div>
</div>

<div id="msgOverlay">
  <h2 id="msgTitle">GAME OVER</h2>
  <p id="msgBody">Os inimigos atravessaram sua defesa!</p>
  <button onclick="restartGame()">REINICIAR</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ========== PATH ==========
const PATH = [
  {x:0,y:80},{x:120,y:80},{x:120,y:200},{x:240,y:200},
  {x:240,y:80},{x:380,y:80},{x:380,y:300},{x:240,y:300},
  {x:240,y:420},{x:480,y:420},{x:480,y:180},{x:600,y:180},
  {x:600,y:380},{x:720,y:380}
];

const CELL = 40;
const COLS = W / CELL;
const ROWS = H / CELL;

// precompute blocked cells (path cells)
function pathCells() {
  const set = new Set();
  for (let i = 0; i < PATH.length - 1; i++) {
    const a = PATH[i], b = PATH[i+1];
    if (a.x === b.x) {
      const col = Math.floor(a.x / CELL);
      const r1 = Math.floor(Math.min(a.y,b.y)/CELL);
      const r2 = Math.floor(Math.max(a.y,b.y)/CELL);
      for (let r = r1; r <= r2; r++) set.add(`${col},${r}`);
    } else {
      const row = Math.floor(a.y / CELL);
      const c1 = Math.floor(Math.min(a.x,b.x)/CELL);
      const c2 = Math.floor(Math.max(a.x,b.x)/CELL);
      for (let c = c1; c <= c2; c++) set.add(`${c},${row}`);
    }
  }
  return set;
}
const BLOCKED = pathCells();

// ========== GAME STATE ==========
let state = {
  lives: 20, gold: 150, wave: 0, score: 0,
  towers: [], enemies: [], bullets: [], particles: [],
  selected: null, selling: false,
  waveActive: false, spawnQueue: [], spawnTimer: 0,
  gameOver: false, victory: false
};

const TOWER_DEFS = {
  basic:  { name:'PULSE',   cost:50,  dmg:20, range:100, rate:60,  color:'#00d4ff', bullet:'#00d4ff', splashR:0, slow:0, sell:25 },
  sniper: { name:'RAILGUN', cost:100, dmg:80, range:180, rate:120, color:'#ff6b35', bullet:'#ff6b35', splashR:0, slow:0, sell:50 },
  splash: { name:'NOVA',    cost:125, dmg:30, range:110, rate:80,  color:'#7fff00', bullet:'#7fff00', splashR:50, slow:0, sell:62 },
  freeze: { name:'CRYO',    cost:80,  dmg:10, range:100, rate:50,  color:'#88ccff', bullet:'#88ccff', splashR:0, slow:0.5, sell:40 }
};

// ========== WAVE DATA ==========
function buildWave(n) {
  const q = [];
  const count = 8 + n * 4;
  const hp = 60 + n * 40;
  const spd = 1.2 + n * 0.15;
  for (let i = 0; i < count; i++) {
    let type = 'basic';
    if (n >= 3 && i % 5 === 0) type = 'tank';
    if (n >= 5 && i % 7 === 0) type = 'fast';
    if (n >= 7 && i % 9 === 0) type = 'boss';
    q.push({ type, hp: hp * (type==='tank'?3:type==='boss'?8:type==='fast'?0.5:1), spd: spd * (type==='fast'?2:type==='tank'?0.5:type==='boss'?0.4:1), delay: i * 40 });
  }
  return q;
}

// ========== ENEMY ==========
function spawnEnemy(cfg) {
  return {
    x: PATH[0].x, y: PATH[0].y,
    pathIdx: 0, progress: 0,
    hp: cfg.hp, maxHp: cfg.hp,
    spd: cfg.spd, type: cfg.type,
    slow: 0, slowTimer: 0,
    id: Math.random()
  };
}

function moveEnemy(e) {
  if (e.pathIdx >= PATH.length - 1) return true;
  const spd = e.slow > 0 ? e.spd * (1 - e.slow) : e.spd;
  const target = PATH[e.pathIdx + 1];
  const dx = target.x - e.x, dy = target.y - e.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if (dist < spd) {
    e.x = target.x; e.y = target.y;
    e.pathIdx++;
    if (e.pathIdx >= PATH.length - 1) return true;
  } else {
    e.x += (dx/dist)*spd;
    e.y += (dy/dist)*spd;
  }
  if (e.slowTimer > 0) { e.slowTimer--; if (e.slowTimer <= 0) e.slow = 0; }
  return false;
}

// ========== TOWER LOGIC ==========
function placeTower(gx, gy) {
  if (!state.selected) return;
  const key = `${gx},${gy}`;
  if (BLOCKED.has(key)) return;
  if (state.towers.find(t=>t.gx===gx&&t.gy===gy)) return;
  const def = TOWER_DEFS[state.selected];
  if (state.gold < def.cost) { flash('Ouro insuficiente!'); return; }
  state.gold -= def.cost;
  state.towers.push({ gx, gy, x: gx*CELL+CELL/2, y: gy*CELL+CELL/2, type: state.selected, cooldown: 0, angle: 0, ...def });
  updateHUD();
}

function towerShoot(tower) {
  if (tower.cooldown > 0) { tower.cooldown--; return; }
  let target = null, minDist = Infinity;
  for (const e of state.enemies) {
    const dx = e.x - tower.x, dy = e.y - tower.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d < tower.range && e.pathIdx > (target?.pathIdx??-1)) { target = e; }
  }
  if (!target) return;
  const dx = target.x - tower.x, dy = target.y - tower.y;
  tower.angle = Math.atan2(dy, dx);
  tower.cooldown = tower.rate;
  state.bullets.push({ x: tower.x, y: tower.y, tx: target.x, ty: target.y, targetId: target.id, spd: 6, dmg: tower.dmg, color: tower.bullet, splashR: tower.splashR, slow: tower.slow, type: tower.type });
}

function moveBullet(b) {
  const dx = b.tx - b.x, dy = b.ty - b.y;
  const d = Math.sqrt(dx*dx+dy*dy);
  if (d < b.spd + 4) {
    // hit
    if (b.splashR > 0) {
      for (const e of state.enemies) {
        const dd = Math.hypot(e.x - b.tx, e.y - b.ty);
        if (dd < b.splashR) dealDmg(e, b.dmg, b.slow);
      }
      spawnParticle(b.tx, b.ty, b.color, 20);
    } else {
      const target = state.enemies.find(e=>e.id===b.targetId);
      if (target) dealDmg(target, b.dmg, b.slow);
      spawnParticle(b.tx, b.ty, b.color, 8);
    }
    return true;
  }
  b.x += (dx/d)*b.spd;
  b.y += (dy/d)*b.spd;
  return false;
}

function dealDmg(e, dmg, slow) {
  e.hp -= dmg;
  if (slow > 0) { e.slow = slow; e.slowTimer = 90; }
  if (e.hp <= 0) {
    const reward = e.type==='boss'?50:e.type==='tank'?20:e.type==='fast'?8:10;
    state.gold += reward;
    state.score += reward * 2;
    state.enemies = state.enemies.filter(x=>x!==e);
    spawnParticle(e.x, e.y, '#ff4466', 15);
    updateHUD();
  }
}

// ========== PARTICLES ==========
function spawnParticle(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 3 + 1;
    state.particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 30, maxLife: 30, color });
  }
}

// ========== DRAW ==========
function drawGrid() {
  ctx.strokeStyle = '#0d1e30';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke(); }
}

function drawPath() {
  // glow road
  ctx.save();
  ctx.shadowColor = '#00d4ff33';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = '#0d2535';
  ctx.lineWidth = CELL;
  ctx.lineCap = 'square';
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x, PATH[i].y);
  ctx.stroke();

  ctx.strokeStyle = '#0f3050';
  ctx.lineWidth = CELL - 8;
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x, PATH[i].y);
  ctx.stroke();

  // dashed center line
  ctx.strokeStyle = '#1a4060';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 10]);
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x, PATH[i].y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawTowers() {
  for (const t of state.towers) {
    const x = t.x, y = t.y;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(t.angle);
    // base
    ctx.fillStyle = '#0a1a2a';
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    // barrel
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(4, -3, 14, 6);
    ctx.shadowBlur = 0;

    // center dot
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    // range preview on hover
    if (state.selected === null && state.hoverTower === t) {
      ctx.save();
      ctx.strokeStyle = t.color + '44';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.arc(x, y, t.range, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }
}

function drawEnemies() {
  for (const e of state.enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);

    const r = e.type==='boss'?18:e.type==='tank'?13:e.type==='fast'?7:10;
    const col = e.type==='boss'?'#ff0055':e.type==='tank'?'#ff8800':e.type==='fast'?'#ffff00':'#ff3366';

    if (e.slow > 0) {
      ctx.shadowColor = '#88ccff';
      ctx.shadowBlur = 10;
    }

    ctx.fillStyle = col;
    ctx.strokeStyle = '#fff4';
    ctx.lineWidth = 1;
    if (e.type==='boss') {
      ctx.beginPath();
      for (let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
      ctx.closePath();
    } else if (e.type==='tank') {
      ctx.fillRect(-r,-r,r*2,r*2);
    } else if (e.type==='fast') {
      ctx.beginPath();
      ctx.moveTo(0,-r);ctx.lineTo(r,r);ctx.lineTo(-r,r);ctx.closePath();
    } else {
      ctx.beginPath();
      ctx.arc(0,0,r,0,Math.PI*2);
    }
    ctx.fill(); ctx.stroke();
    ctx.restore();

    // HP bar
    const bw = (e.type==='boss'?36:e.type==='tank'?26:e.type==='fast'?14:20);
    const bx = e.x - bw/2, by = e.y - r - 10;
    ctx.fillStyle = '#200';
    ctx.fillRect(bx, by, bw, 4);
    ctx.fillStyle = e.slow>0?'#88ccff':col;
    ctx.fillRect(bx, by, bw*(e.hp/e.maxHp), 4);
  }
}

function drawBullets() {
  for (const b of state.bullets) {
    ctx.save();
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.type==='sniper'?4:3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of state.particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawRangePreview(mx, my) {
  if (!state.selected) return;
  const def = TOWER_DEFS[state.selected];
  const gx = Math.floor(mx/CELL), gy = Math.floor(my/CELL);
  const key = `${gx},${gy}`;
  const blocked = BLOCKED.has(key) || state.towers.find(t=>t.gx===gx&&t.gy===gy);
  const cx = gx*CELL+CELL/2, cy = gy*CELL+CELL/2;

  ctx.save();
  ctx.strokeStyle = blocked ? '#ff2244aa' : def.color + '66';
  ctx.fillStyle = blocked ? '#ff224411' : def.color + '11';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.arc(cx, cy, def.range, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = blocked ? '#ff2244' : def.color;
  ctx.lineWidth = 2;
  ctx.strokeRect(gx*CELL+1, gy*CELL+1, CELL-2, CELL-2);
  ctx.restore();
}

function drawStartArrow() {
  ctx.save();
  ctx.fillStyle = '#00d4ff88';
  ctx.font = '14px Orbitron';
  ctx.fillText('START ▶', 4, H-8);
  ctx.fillStyle = '#ff244488';
  ctx.fillText('END', W-50, 370);
  ctx.restore();
}

let mouseX = 0, mouseY = 0;

function gameLoop() {
  ctx.clearRect(0, 0, W, H);

  // bg
  ctx.fillStyle = '#070d18';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawPath();
  drawStartArrow();
  drawTowers();
  drawEnemies();
  drawBullets();
  drawParticles();
  drawRangePreview(mouseX, mouseY);

  if (!state.gameOver && !state.victory) {
    // spawn
    if (state.waveActive && state.spawnQueue.length > 0) {
      state.spawnTimer++;
      while (state.spawnQueue.length > 0 && state.spawnQueue[0].delay <= state.spawnTimer) {
        const cfg = state.spawnQueue.shift();
        state.enemies.push(spawnEnemy(cfg));
      }
    }

    // move enemies
    for (const e of [...state.enemies]) {
      const reached = moveEnemy(e);
      if (reached) {
        state.enemies = state.enemies.filter(x=>x!==e);
        state.lives--;
        updateHUD();
        if (state.lives <= 0) { endGame(false); return; }
      }
    }

    // towers shoot
    for (const t of state.towers) towerShoot(t);

    // bullets
    state.bullets = state.bullets.filter(b => !moveBullet(b));

    // particles
    for (const p of state.particles) { p.x+=p.vx; p.y+=p.vy; p.vx*=0.9; p.vy*=0.9; p.life--; }
    state.particles = state.particles.filter(p=>p.life>0);

    // wave done?
    if (state.waveActive && state.spawnQueue.length===0 && state.enemies.length===0) {
      state.waveActive = false;
      document.getElementById('startBtn').textContent = '▶ PRÓXIMA WAVE';
      if (state.wave >= 15) { endGame(true); return; }
    }
  }

  requestAnimationFrame(gameLoop);
}

function startWave() {
  if (state.waveActive || state.gameOver) return;
  state.wave++;
  state.spawnQueue = buildWave(state.wave);
  state.spawnTimer = 0;
  state.waveActive = true;
  document.getElementById('startBtn').textContent = '⏳ EM ANDAMENTO...';
  updateHUD();
  showWaveAnnounce(`WAVE ${state.wave}`);
}

function showWaveAnnounce(text) {
  const el = document.createElement('div');
  el.className = 'wave-announce';
  el.textContent = text;
  el.style.left = W/2 + 'px';
  el.style.top = H/2 + 'px';
  el.style.position = 'absolute';
  document.getElementById('canvasWrap').appendChild(el);
  setTimeout(()=>el.remove(), 2000);
}

function endGame(win) {
  state.gameOver = true;
  const ov = document.getElementById('msgOverlay');
  document.getElementById('msgTitle').textContent = win ? '✦ VITÓRIA' : '✕ GAME OVER';
  document.getElementById('msgBody').textContent = win
    ? `Você sobreviveu a 15 waves! Score: ${state.score}`
    : `Seus inimigos chegaram ao fim! Score: ${state.score}`;
  ov.style.borderColor = win ? '#7fff00' : '#ff2244';
  ov.querySelector('h2').style.color = win ? '#7fff00' : '#ff2244';
  ov.style.display = 'block';
}

function restartGame() {
  document.getElementById('msgOverlay').style.display = 'none';
  state = { lives:20, gold:150, wave:0, score:0, towers:[], enemies:[], bullets:[], particles:[], selected:null, selling:false, waveActive:false, spawnQueue:[], spawnTimer:0, gameOver:false, victory:false };
  updateHUD();
  document.getElementById('startBtn').textContent = '▶ INICIAR WAVE';
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  gameLoop();
}

function selectTower(type) {
  state.selected = type;
  state.selling = false;
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  if (type) document.getElementById('btn-'+type)?.classList.add('selected');
}

function sellMode() {
  state.selling = !state.selling;
  state.selected = null;
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('infoBox').innerHTML = state.selling
    ? '<span class="highlight">Clique em uma torre para vender</span>'
    : 'Selecione uma torre e clique no mapa para posicioná-la.';
}

function flash(msg) {
  showWaveAnnounce(msg);
}

function updateHUD() {
  document.getElementById('livesVal').textContent = state.lives;
  document.getElementById('goldVal').textContent = state.gold;
  document.getElementById('waveVal').textContent = state.wave;
  document.getElementById('scoreVal').textContent = state.score;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  if (!state.selected) {
    const gx = Math.floor(mouseX/CELL), gy = Math.floor(mouseY/CELL);
    state.hoverTower = state.towers.find(t=>t.gx===gx&&t.gy===gy) || null;
  }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const gx = Math.floor(mx/CELL), gy = Math.floor(my/CELL);

  if (state.selling) {
    const idx = state.towers.findIndex(t=>t.gx===gx&&t.gy===gy);
    if (idx !== -1) {
      state.gold += state.towers[idx].sell;
      state.towers.splice(idx,1);
      updateHUD();
    }
    return;
  }

  if (state.selected) {
    placeTower(gx, gy);
  }
});

// start
updateHUD();
gameLoop();
</script>
</body>
</html>

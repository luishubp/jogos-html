<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Five Nights at Freddy's</title>
  <style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#090909; overflow:hidden; }</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURAÇÕES DO JOGO
// ─────────────────────────────────────────────────────────────────────────────
const HOUR_DURATION = 90;  // segundos reais por hora in-game
const TICK_MS       = 500; // intervalo do loop principal

// Cada caminho descreve as posições intermediárias até a posição de ataque.
// "corridor_w" é o corredor adjacente à PORTA ESQUERDA
// "corridor_e" é o corredor adjacente à PORTA DIREITA
// "left_door" / "right_door" = posição de ataque imediato
const BONNIE_PATH = ["stage", "dining", "backstage", "corridor_w", "left_door"];
const CHICA_PATH  = ["stage", "dining", "restrooms",  "corridor_e", "right_door"];
const FREDDY_PATH = ["stage", "dining", "restrooms",  "corridor_e", "right_door"];

// Mapa posição → câmera (para saber em qual câmera o animatrônico aparece)
const POS_TO_CAM = {
  stage:      "CAM 1A",
  dining:     "CAM 1B",
  backstage:  "CAM 3",
  restrooms:  "CAM 7",
  corridor_w: "CAM 2A",
  corridor_e: "CAM 4A",
};

// "door_cam" = câmera do canto diretamente na entrada da porta.
// Esta câmera mostra o animatrônico mesmo sem a luz (ele aparece no canto escuro).
// A luz do corredor mostra o animatrônico quando ele está em corridor_w/corridor_e OU left_door/right_door.
const LEFT_DOOR_CAMS  = new Set(["CAM 2A", "CAM 2B"]); // corredor oeste → porta esquerda
const RIGHT_DOOR_CAMS = new Set(["CAM 4A", "CAM 4B"]); // corredor leste → porta direita

const CAMERAS = {
  "CAM 1A": { label: "Show Stage",      bg: "#1e1a08", accent: "#c8a000" },
  "CAM 1B": { label: "Dining Area",     bg: "#180e08", accent: "#a05020" },
  "CAM 1C": { label: "Pirate Cove",     bg: "#100808", accent: "#902020" },
  "CAM 2A": { label: "West Hall",       bg: "#0a0c18", accent: "#4060c0", doorHint: null },
  "CAM 2B": { label: "W. Hall Corner",  bg: "#080a14", accent: "#304090", doorHint: "← PORTA ESQ." },
  "CAM 3":  { label: "Supply Closet",   bg: "#0e100a", accent: "#506030" },
  "CAM 4A": { label: "East Hall",       bg: "#14080e", accent: "#a04080", doorHint: null },
  "CAM 4B": { label: "E. Hall Corner",  bg: "#100608", accent: "#803060", doorHint: "PORTA DIR. →" },
  "CAM 7":  { label: "Restrooms",       bg: "#080e10", accent: "#208060" },
};

const ANIM_EMOJI = { Bonnie: "🐰", Chica: "🐥", Freddy: "🎩", Foxy: "🦊" };
const ANIM_COLOR = { Bonnie: "#a080e8", Chica: "#f0c040", Freddy: "#d08040", Foxy: "#e05040" };
const FOXY_STAGES = ["Cortina fechada", "Espreitando…", "Saiu da cortina!", "CORRENDO!"];

// ─────────────────────────────────────────────────────────────────────────────
// VISUAIS DAS SALAS NAS CÂMERAS
// ─────────────────────────────────────────────────────────────────────────────

// Animatrônico flutuante dentro da câmera
function AnimInCam({ name, bottom = "35%", left = "50%" }) {
  return (
    <div style={{
      position: "absolute", bottom, left,
      transform: "translateX(-50%)",
      fontSize: 40,
      color: ANIM_COLOR[name],
      textShadow: `0 0 16px ${ANIM_COLOR[name]}`,
      animation: "pulse 2s infinite",
      zIndex: 2,
    }}>
      {ANIM_EMOJI[name]}
    </div>
  );
}

function ShowStage({ anims }) {
  return (
    <div style={{ width: "100%", height: "100%", position: "relative", background: "#1e1a08", overflow: "hidden" }}>
      {/* Palco elevado */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "36%", background: "#2a2010", borderTop: "3px solid #4a3a18" }} />
      {/* Cortinas */}
      <div style={{ position: "absolute", top: 0, left: 0, width: "12%", height: "100%", background: "#4a1010" }} />
      <div style={{ position: "absolute", top: 0, right: 0, width: "12%", height: "100%", background: "#4a1010" }} />
      {/* Spots */}
      {[25, 50, 74].map(x => (
        <div key={x} style={{ position: "absolute", top: 0, left: `${x}%`, width: 28, height: 28, borderRadius: "50%", background: "#ffffff12", transform: "translateX(-50%)" }} />
      ))}
      {/* Animatrônicos no palco */}
      {anims.map((name, i) => (
        <AnimInCam key={name} name={name} bottom="36%" left={`${28 + i * 22}%`} />
      ))}
    </div>
  );
}

function DiningArea({ anims }) {
  return (
    <div style={{ width: "100%", height: "100%", position: "relative", background: "#180e08", overflow: "hidden" }}>
      {/* Teto / luz */}
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "14%", background: "#1e1208" }} />
      <div style={{ position: "absolute", top: "12%", left: "50%", transform: "translateX(-50%)", width: 14, height: 18, background: "#c8a00035", boxShadow: "0 0 22px #c8a00050", borderRadius: 3 }} />
      {/* Mesas */}
      {[[12, 55], [44, 60], [68, 50]].map(([x, y], i) => (
        <div key={i}>
          <div style={{ position: "absolute", left: `${x}%`, top: `${y}%`, width: 52, height: 28, background: "#2a1e14", border: "1px solid #3a2a18", borderRadius: 2 }} />
          <div style={{ position: "absolute", left: `${x + 8}%`, top: `${y + 27}%`, width: 8, height: 18, background: "#241a10" }} />
          <div style={{ position: "absolute", left: `${x + 36}%`, top: `${y + 27}%`, width: 8, height: 18, background: "#241a10" }} />
        </div>
      ))}
      {anims.map((name, i) => (
        <AnimInCam key={name} name={name} bottom="38%" left={`${25 + i * 30}%`} />
      ))}
    </div>
  );
}

function PirateCove({ foxyStage }) {
  // As cortinas abrem progressivamente conforme o stage do Foxy
  const openPct = foxyStage * 16;
  return (
    <div style={{ width: "100%", height: "100%", position: "relative", background: "#100808", overflow: "hidden" }}>
      {/* Placa */}
      <div style={{ position: "absolute", top: 10, left: "50%", transform: "translateX(-50%)", background: "#2a1010", border: "1px solid #4a2020", padding: "3px 12px", borderRadius: 2, zIndex: 3 }}>
        <span style={{ fontSize: 9, color: "#8a4040", letterSpacing: 2 }}>★ PIRATE COVE ★</span>
      </div>
      {/* Interior da cove */}
      <div style={{ position: "absolute", top: "18%", left: "10%", right: "10%", bottom: "6%", background: "#0c0505", border: "2px solid #2a1010", borderRadius: 4 }} />
      {/* Cortina esquerda que abre */}
      <div style={{ position: "absolute", top: "18%", left: "10%", width: `${44 - openPct}%`, bottom: "6%", background: "#501010", borderRight: "3px solid #280808", transition: "width 0.8s", zIndex: 2 }} />
      {/* Cortina direita que abre */}
      <div style={{ position: "absolute", top: "18%", right: "10%", width: `${44 - openPct}%`, bottom: "6%", background: "#501010", borderLeft: "3px solid #280808", transition: "width 0.8s", zIndex: 2 }} />
      {/* Foxy (aparece a partir do stage 1) */}
      {foxyStage > 0 && (
        <div style={{
          position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
          fontSize: foxyStage === 3 ? 54 : foxyStage === 2 ? 44 : 32,
          color: ANIM_COLOR.Foxy,
          textShadow: `0 0 20px ${ANIM_COLOR.Foxy}`,
          transition: "font-size 0.5s",
          zIndex: 3,
        }}>🦊</div>
      )}
      {foxyStage === 0 && (
        <div style={{ position: "absolute", top: "52%", left: "50%", transform: "translate(-50%,-50%)", fontSize: 9, color: "#3a1a1a", zIndex: 3 }}>FORA DE SERVIÇO</div>
      )}
      {/* Label do stage */}
      <div style={{ position: "absolute", bottom: 10, left: "50%", transform: "translateX(-50%)", fontSize: 9, letterSpacing: 1, whiteSpace: "nowrap", color: ["#2a1a1a", "#775500", "#aa4400", "#dd2200"][foxyStage], zIndex: 3 }}>
        {FOXY_STAGES[foxyStage]}
      </div>
    </div>
  );
}

function HallCam({ cam, anims }) {
  const info = CAMERAS[cam];
  // Corredor com perspectiva usando div trapézio
  return (
    <div style={{ width: "100%", height: "100%", position: "relative", background: info.bg, overflow: "hidden" }}>
      {/* Perspectiva de corredor */}
      <div style={{ position: "absolute", top: "15%", left: "30%", right: "30%", bottom: "5%", background: "#07070d", border: `1px solid ${info.accent}18` }} />
      <div style={{ position: "absolute", top: "25%", left: "40%", right: "40%", bottom: "5%", background: "#05050a" }} />
      {/* Paredes */}
      <div style={{ position: "absolute", inset: 0, left: 0, width: "25%", background: `${info.accent}0a`, borderRight: `2px solid ${info.accent}22` }} />
      <div style={{ position: "absolute", inset: 0, right: 0, left: "75%", background: `${info.accent}0a`, borderLeft: `2px solid ${info.accent}22` }} />
      {/* Luz no teto */}
      <div style={{ position: "absolute", top: "4%", left: "50%", transform: "translateX(-50%)", width: 9, height: 9, borderRadius: "50%", background: `${info.accent}60`, boxShadow: `0 0 18px ${info.accent}` }} />
      {/* Linhas do chão convergindo para o fundo */}
      {[1, 2, 3].map(i => (
        <div key={i} style={{
          position: "absolute",
          top: `${35 + i * 12}%`,
          left: `${i * 7}%`,
          right: `${i * 7}%`,
          height: 1,
          background: `${info.accent}14`,
        }} />
      ))}
      {/* Aviso de qual porta este corredor leva — apenas nas corner cams */}
      {info.doorHint && (
        <div style={{
          position: "absolute", top: 8, right: 8,
          fontSize: 8, color: info.accent,
          background: "#00000060", padding: "2px 5px", borderRadius: 2,
          letterSpacing: 1,
        }}>{info.doorHint}</div>
      )}
      {anims.map((name, i) => (
        <AnimInCam key={name} name={name} bottom="40%" left={`${38 + i * 14}%`} />
      ))}
    </div>
  );
}

function GenericRoom({ cam, anims }) {
  const info = CAMERAS[cam];
  return (
    <div style={{ width: "100%", height: "100%", position: "relative", background: info.bg, overflow: "hidden" }}>
      <div style={{ position: "absolute", top: "10%", left: "5%", width: "32%", height: 55, background: `${info.accent}15`, border: `1px solid ${info.accent}25`, borderRadius: 2 }} />
      <div style={{ position: "absolute", top: "18%", right: "8%", width: "26%", height: 38, background: `${info.accent}10`, border: `1px solid ${info.accent}20`, borderRadius: 2 }} />
      <div style={{ position: "absolute", bottom: "8%", left: "18%", width: "62%", height: 48, background: `${info.accent}12`, border: `1px solid ${info.accent}22`, borderRadius: 3 }} />
      {[1, 2, 3].map(i => (
        <div key={i} style={{ position: "absolute", bottom: `${i * 12}%`, left: 0, right: 0, height: 1, background: `${info.accent}10` }} />
      ))}
      {anims.map((name, i) => (
        <AnimInCam key={name} name={name} bottom="35%" left={`${28 + i * 28}%`} />
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// FEED DE UMA CÂMERA (wrapper com scanlines, REC, overlay)
// ─────────────────────────────────────────────────────────────────────────────
function CamFeed({ camId, animsHere, foxyStage }) {
  const cam = CAMERAS[camId];
  if (!cam) return null;

  const renderRoom = () => {
    if (camId === "CAM 1A") return <ShowStage anims={animsHere} />;
    if (camId === "CAM 1B") return <DiningArea anims={animsHere} />;
    if (camId === "CAM 1C") return <PirateCove foxyStage={foxyStage} />;
    if (["CAM 2A", "CAM 2B", "CAM 4A", "CAM 4B"].includes(camId)) return <HallCam cam={camId} anims={animsHere} />;
    return <GenericRoom cam={camId} anims={animsHere} />;
  };

  return (
    <div style={{ flex: 1, border: "2px solid #2a3028", borderRadius: 4, margin: "0 0 8px", position: "relative", overflow: "hidden", minHeight: 200 }}>
      {/* Sala */}
      <div style={{ position: "absolute", inset: 0 }}>{renderRoom()}</div>
      {/* Scanlines */}
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", backgroundImage: "repeating-linear-gradient(0deg,transparent,transparent 3px,#00000020 3px,#00000020 4px)", zIndex: 4 }} />
      {/* Vinheta */}
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "radial-gradient(ellipse at center, transparent 50%, #00000070 100%)", zIndex: 5 }} />
      {/* Label da câmera */}
      <div style={{ position: "absolute", top: 10, left: 10, zIndex: 6, fontSize: 10, color: "#4d8", letterSpacing: 1 }}>
        {camId} — {cam.label}
      </div>
      {/* REC piscando */}
      <div style={{ position: "absolute", bottom: 10, right: 10, zIndex: 6, display: "flex", alignItems: "center", gap: 4, fontSize: 9, color: "#4d8" }}>
        <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#f00", display: "inline-block", animation: "blink 1s infinite" }} />
        REC
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// PAINEL DE CÂMERAS (tela cheia ao abrir)
// ─────────────────────────────────────────────────────────────────────────────
function CamPanel({ activeCam, setActiveCam, onClose, bPos, cPos, fPos, foxyStage }) {
  // Descobre quais animatrônicos aparecem em cada câmera
  const getAnims = (cam) => {
    const list = [];
    if (POS_TO_CAM[bPos] === cam) list.push("Bonnie");
    if (POS_TO_CAM[cPos] === cam) list.push("Chica");
    if (POS_TO_CAM[fPos] === cam) list.push("Freddy");
    return list;
  };

  return (
    <div style={{ position: "absolute", inset: 0, background: "#060a08", display: "flex", flexDirection: "column", fontFamily: "monospace", zIndex: 10, padding: 8, boxSizing: "border-box" }}>
      {/* Feed da câmera selecionada */}
      <CamFeed camId={activeCam} animsHere={getAnims(activeCam)} foxyStage={foxyStage} />
      {/* Grade de seleção */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 4 }}>
        {Object.entries(CAMERAS).map(([id, info]) => {
          const isActive = activeCam === id;
          const hasAnim  = getAnims(id).length > 0 || (id === "CAM 1C" && foxyStage > 0);
          return (
            <div key={id} onClick={() => setActiveCam(id)} style={{
              padding: "5px 8px",
              background: isActive ? "#0d1a0d" : "#0a0a0a",
              border: `1px solid ${isActive ? "#4d8" : hasAnim ? "#664400" : "#1e1e1e"}`,
              cursor: "pointer", borderRadius: 2, position: "relative",
            }}>
              <div style={{ fontSize: 9, color: isActive ? "#4d8" : "#333", letterSpacing: 1 }}>{id}</div>
              <div style={{ fontSize: 10, color: isActive ? "#8ca" : "#2a2a2a", marginTop: 1 }}>{info.label}</div>
              {/* Ponto laranja = animatrônico presente */}
              {hasAnim && <span style={{ position: "absolute", top: 4, right: 5, width: 6, height: 6, borderRadius: "50%", background: "#f80", animation: "blink 0.7s infinite", display: "inline-block" }} />}
            </div>
          );
        })}
        <div onClick={onClose} style={{ padding: "5px 8px", background: "#0a0a0a", border: "1px solid #2a2a2a", cursor: "pointer", borderRadius: 2, display: "flex", alignItems: "center", justifyContent: "center", color: "#555", fontSize: 10, letterSpacing: 1 }}>
          ▼ FECHAR
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ESCRITÓRIO
// ─────────────────────────────────────────────────────────────────────────────
function Office({ leftDoor, rightDoor, leftLight, rightLight,
  bonnieNearLeft, chicaNearRight, freddyNearRight,
  bonnieAtDoor, chicaAtDoor, freddyAtDoor,
  onLeftDoor, onRightDoor, onLeftLight, onRightLight }) {

  // A LUZ mostra o animatrônico quando está no corredor adjacente OU na posição da porta
  const leftVisible  = leftLight && (bonnieNearLeft || bonnieAtDoor);
  const rightVisible = rightLight && (chicaNearRight || chicaAtDoor || freddyNearRight || freddyAtDoor);
  const rightIcon    = (freddyNearRight || freddyAtDoor) ? "🎩" : "🐥";
  const rightName    = (freddyNearRight || freddyAtDoor) ? "FREDDY!" : "CHICA!";

  const Btn = ({ active, color, onMD, onMU, onML, onTS, onTE, onClick, children }) => (
    <button
      onMouseDown={onMD} onMouseUp={onMU} onMouseLeave={onML}
      onTouchStart={onTS} onTouchEnd={onTE} onClick={onClick}
      style={{
        padding: "9px 0", background: active ? `${color}22` : "#111",
        border: `2px solid ${active ? color : "#222"}`,
        color: active ? color : "#444",
        fontSize: 11, cursor: "pointer", borderRadius: 3,
        letterSpacing: 1, width: "100%", fontFamily: "monospace",
      }}>{children}</button>
  );

  // Coluna do corredor (esquerdo ou direito)
  const CorridorCol = ({ side, doorClosed, lightOn, visible, icon, name, nearWarning, nearName }) => (
    <div style={{
      width: 128, flexShrink: 0,
      background: lightOn ? "#201c0c" : "#0c0a04",
      borderRight: side === "left" ? "3px solid #221a04" : undefined,
      borderLeft:  side === "right" ? "3px solid #221a04" : undefined,
      display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "space-between",
      padding: "54px 9px 16px", transition: "background 0.2s",
      boxSizing: "border-box",
    }}>
      {/* Legenda */}
      <div style={{ textAlign: "center", flexShrink: 0 }}>
        <div style={{ fontSize: 8, color: side === "left" ? "#4060c060" : "#a0408060", letterSpacing: 2, marginBottom: 2 }}>
          {side === "left" ? "CORREDOR ESQ." : "CORREDOR DIR."}
        </div>
        <div style={{ fontSize: 8, color: side === "left" ? "#304080" : "#803040" }}>
          {side === "left" ? "🐰 Bonnie" : "🐥🎩 Chica / Freddy"}
        </div>
      </div>

      {/* Aviso de proximidade (quando está no corredor adjacente) */}
      {nearWarning && !doorClosed && (
        <div style={{ background: "#3a0800", border: "1px solid #882200", borderRadius: 2, padding: "4px 5px", textAlign: "center", flexShrink: 0 }}>
          <div style={{ fontSize: 9, color: "#ff4400", animation: "blink 0.5s infinite" }}>⚠ {nearName}</div>
          <div style={{ fontSize: 8, color: "#882200" }}>no corredor!</div>
        </div>
      )}

      {/* Janela do corredor / porta */}
      <div style={{
        flex: 1, width: "100%", margin: "9px 0",
        background: doorClosed ? "#281e04" : visible ? "#120a04" : "#08070 3",
        border: `2px solid ${doorClosed ? "#5a3a04" : visible ? "#aa4400" : "#1c1404"}`,
        borderRadius: 3,
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        gap: 5, minHeight: 80, transition: "all 0.2s",
        overflow: "hidden",
      }}>
        {doorClosed ? (
          <span style={{ fontSize: 10, color: "#7a5a14", letterSpacing: 1 }}>■ FECHADO</span>
        ) : visible ? (
          <>
            <span style={{ fontSize: 44, animation: "flicker 0.35s infinite" }}>{icon}</span>
            <span style={{ fontSize: 8, color: "#cc7700", letterSpacing: 1 }}>{name}</span>
          </>
        ) : (
          <span style={{ fontSize: 9, color: "#161410" }}>vazio</span>
        )}
      </div>

      {/* Botões */}
      <div style={{ display: "flex", flexDirection: "column", gap: 5, width: "100%", flexShrink: 0 }}>
        {side === "left" ? (
          <>
            <Btn active={lightOn} color="#ffcc00"
              onMD={() => onLeftLight(true)} onMU={() => onLeftLight(false)} onML={() => onLeftLight(false)}
              onTS={e => { e.preventDefault(); onLeftLight(true); }} onTE={() => onLeftLight(false)}
            >💡 LUZ</Btn>
            <Btn active={doorClosed} color="#ff8800" onClick={onLeftDoor}>
              {doorClosed ? "🔒 ABRIR" : "🚪 FECHAR"}
            </Btn>
          </>
        ) : (
          <>
            <Btn active={lightOn} color="#ffcc00"
              onMD={() => onRightLight(true)} onMU={() => onRightLight(false)} onML={() => onRightLight(false)}
              onTS={e => { e.preventDefault(); onRightLight(true); }} onTE={() => onRightLight(false)}
            >💡 LUZ</Btn>
            <Btn active={doorClosed} color="#ff8800" onClick={onRightDoor}>
              {doorClosed ? "🔒 ABRIR" : "🚪 FECHAR"}
            </Btn>
          </>
        )}
      </div>
    </div>
  );

  return (
    <div style={{ position: "absolute", inset: 0, background: "#131008", display: "flex", alignItems: "stretch", fontFamily: "monospace" }}>
      {/* Corredor esquerdo */}
      <CorridorCol
        side="left"
        doorClosed={leftDoor}
        lightOn={leftLight}
        visible={leftVisible}
        icon="🐰" name="BONNIE!"
        nearWarning={bonnieNearLeft && !leftDoor}
        nearName="BONNIE"
      />

      {/* Centro */}
      <div style={{ flex: 1, background: "#111008", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", padding: "54px 12px 60px", boxSizing: "border-box" }}>
        {/* Decorações da parede */}
        <div style={{ display: "flex", justifyContent: "space-between", width: "90%", flexShrink: 0 }}>
          <div style={{ width: 55, height: 70, background: "#1a1208", border: "2px solid #2a1e08", borderRadius: 2, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, opacity: 0.5 }}>🎪</div>
          <div style={{ fontSize: 22, animation: "spin 3s linear infinite", color: "#2a2418", alignSelf: "center" }}>🌀</div>
          <div style={{ width: 48, height: 62, background: "#0e1408", border: "2px solid #1a2008", borderRadius: 2, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, opacity: 0.45 }}>🎠</div>
        </div>

        {/* Mesa */}
        <div style={{ width: "85%", height: 46, background: "#201a0c", border: "2px solid #2e2410", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "space-around", padding: "0 14px", flexShrink: 0 }}>
          <div style={{ width: 32, height: 20, background: "#0e0e0e", border: "1px solid #2a2a2a", borderRadius: 2 }} />
          <div style={{ width: 68, height: 8, background: "#141210", borderRadius: 1 }} />
          <div style={{ width: 22, height: 22, background: "#0e0e0e", border: "1px solid #2a2a2a", borderRadius: "50%" }} />
        </div>
      </div>

      {/* Corredor direito */}
      <CorridorCol
        side="right"
        doorClosed={rightDoor}
        lightOn={rightLight}
        visible={rightVisible}
        icon={rightIcon} name={rightName}
        nearWarning={(chicaNearRight || freddyNearRight) && !rightDoor}
        nearName={chicaNearRight && freddyNearRight ? "CHICA & FREDDY" : chicaNearRight ? "CHICA" : "FREDDY"}
      />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// HUD (sempre sobreposto)
// ─────────────────────────────────────────────────────────────────────────────
function HUD({ hour, power, camOpen, toggleCam }) {
  const barColor = power > 50 ? "#00cc44" : power > 20 ? "#ff8800" : "#ff2200";
  return (
    <>
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, height: 46,
        background: "#000000e0", display: "flex", alignItems: "center",
        justifyContent: "space-between", padding: "0 14px", zIndex: 30,
        fontFamily: "monospace", borderBottom: "1px solid #1e1e14", boxSizing: "border-box",
      }}>
        <span style={{ fontSize: 10, color: "#2a2820", letterSpacing: 2 }}>FREDDY FAZBEAR'S</span>
        <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
          <div style={{ fontSize: 12, color: "#997700", letterSpacing: 2 }}>{hour}:00 AM</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 10, color: "#2a2a2a" }}>⚡</span>
            <div style={{ width: 80, height: 10, background: "#111", border: "1px solid #1e1e1e", borderRadius: 2, overflow: "hidden" }}>
              <div style={{ width: `${Math.max(0, power)}%`, height: "100%", background: barColor, transition: "width 0.5s, background 0.5s" }} />
            </div>
            <span style={{ fontSize: 11, color: barColor, minWidth: 34, textAlign: "right" }}>
              {Math.max(0, Math.round(power))}%
            </span>
          </div>
        </div>
      </div>
      {!camOpen && (
        <div style={{ position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)", zIndex: 30 }}>
          <button onClick={toggleCam} style={{ padding: "10px 34px", background: "#0c0c0a", border: "2px solid #3a3a28", color: "#777", fontSize: 11, cursor: "pointer", borderRadius: 3, letterSpacing: 2, fontFamily: "monospace" }}>
            ▲ CÂMERAS
          </button>
        </div>
      )}
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TELAS DE MENU / GAME OVER / VITÓRIA
// ─────────────────────────────────────────────────────────────────────────────

      <p style={{ color: "#444", letterSpacing: 5, fontSize: 11, margin: "0 0 10px" }}>FREDDY FAZBEAR'S PIZZA</p>
      <h1 style={{ fontSize: "clamp(28px,7vw,58px)", color: "#e8c000", margin: 0, textShadow: "0 0 28px #e8c00060", letterSpacing: 3, textAlign: "center" }}>
        FIVE NIGHTS<br />AT FREDDY'S
      </h1>
      <p style={{ color: "#383838", fontSize: 13, margin: "8px 0 38px", letterSpacing: 2 }}>— Noite 1 —</p>
      <button onClick={onStart} style={{ padding: "12px 48px", background: "transparent", border: "2px solid #e8c000", color: "#e8c000", fontSize: 14, cursor: "pointer", letterSpacing: 3, borderRadius: 2, boxShadow: "0 0 16px #e8c00028", fontFamily: "monospace" }}>
        INICIAR
      </button>
      <div style={{ marginTop: 44, maxWidth: 460, textAlign: "center", fontSize: 11, lineHeight: 2, color: "#2e2e2e", padding: "0 24px" }}>
        Abra as <b style={{ color: "#4e4e3e" }}>CÂMERAS</b> para ver onde estão os animatrônicos.
        Use a <b style={{ color: "#4e4e3e" }}>LUZ</b> para iluminar o corredor (segure o botão).
        Feche a <b style={{ color: "#4e4e3e" }}>PORTA</b> se alguém estiver chegando.
        Sobreviva até as 6AM sem zerar a energia!

}

function DeadScreen({ killer, onRestart }) {
  return (
    <div style={{ minHeight: "100vh", background: "#0c0000", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "monospace" }}>
      <div style={{ fontSize: 80 }}>{ANIM_EMOJI[killer] || "💀"}</div>
      <h2 style={{ fontSize: "clamp(28px,5vw,46px)", color: "#cc2200", textShadow: "0 0 20px #ff0000", letterSpacing: 4, margin: "14px 0 8px" }}>GAME OVER</h2>
      <p style={{ color: "#663322", fontSize: 14 }}>{killer} te atacou!</p>
      <button onClick={onRestart} style={{ marginTop: 28, padding: "10px 40px", background: "transparent", border: "2px solid #cc2200", color: "#cc2200", fontSize: 12, cursor: "pointer", letterSpacing: 2, borderRadius: 2, fontFamily: "monospace" }}>

function WinScreen({ onRestart }) {

    <div style={{ minHeight: "100vh", background: "#00100a", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "monospace" }}>
      <div style={{ fontSize: 70 }}>🌅</div>
      <h2 style={{ fontSize: "clamp(28px,5vw,46px)", color: "#00cc55", textShadow: "0 0 20px #00ff66", letterSpacing: 4, margin: "14px 0 8px" }}>6:00 AM</h2>
      <p style={{ color: "#226633", fontSize: 14 }}>Você sobreviveu à noite!</p>
      <button onClick={onRestart} style={{ marginTop: 28, padding: "10px 40px", background: "transparent", border: "2px solid #00cc55", color: "#00cc55", fontSize: 12, cursor: "pointer", letterSpacing: 2, borderRadius: 2, fontFamily: "monospace" }}>
        JOGAR NOVAMENTE
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// COMPONENTE PRINCIPAL
// ─────────────────────────────────────────────────────────────────────────────
function FNAF() {
  const [screen,     setScreen]     = useState("menu");
  const [camOpen,    setCamOpen]    = useState(false);
  const [activeCam,  setActiveCam]  = useState("CAM 1A");
  const [leftDoor,   setLeftDoor]   = useState(false);
  const [rightDoor,  setRightDoor]  = useState(false);
  const [leftLight,  setLeftLight]  = useState(false);
  const [rightLight, setRightLight] = useState(false);
  const [power,      setPower]      = useState(100);
  const [hour,       setHour]       = useState(1);
  const [bonniePos,  setBonniePos]  = useState(0);
  const [chicaPos,   setChicaPos]   = useState(0);
  const [freddyPos,  setFreddyPos]  = useState(0);
  const [foxyStage,  setFoxyStage]  = useState(0);
  const [killer,     setKiller]     = useState(null);

  // g.current = estado em tempo real para o loop (evita stale closures)
  const g    = useRef({});
  const loop = useRef(null);

  const die = useCallback((who) => {
    g.current.dead = true;
    clearInterval(loop.current);
    setKiller(who);
    setScreen("dead");
  }, []);

  const tick = useCallback(() => {
    const s = g.current;
    if (s.dead || s.won) return;
    s.elapsed += TICK_MS / 1000;

    // ── Hora in-game ──
    const newHour = Math.min(6, 1 + Math.floor(s.elapsed / HOUR_DURATION));
    if (newHour !== s.hour) {
      s.hour = newHour;
      setHour(newHour);
      if (newHour >= 6) { s.won = true; clearInterval(loop.current); setScreen("won"); return; }
    }

    // ── Consumo de energia por tick (0.5s) ──
    let drain = 0.008;
    if (s.camOpen)    drain += 0.012;
    if (s.leftDoor)   drain += 0.010;
    if (s.rightDoor)  drain += 0.010;
    if (s.leftLight)  drain += 0.006;
    if (s.rightLight) drain += 0.006;
    s.power -= drain;
    if (s.power <= 0) { die("Freddy"); return; }
    setPower(+s.power.toFixed(2));

    // Chance de movimento por tick: sobe com a hora
    const moveChance = 0.004 + s.hour * 0.0035;

    // ── Bonnie ──
    if (s.bonniePos < BONNIE_PATH.length - 1 && Math.random() < moveChance) {
      s.bonniePos++;
      setBonniePos(s.bonniePos);
    }
    // ── Chica ──
    if (s.chicaPos < CHICA_PATH.length - 1 && Math.random() < moveChance) {
      s.chicaPos++;
      setChicaPos(s.chicaPos);
    }
    // ── Freddy: para quando a câmera está apontada para ele ──
    const freddyCam     = POS_TO_CAM[FREDDY_PATH[s.freddyPos]];
    const freddyWatched = s.camOpen && s.activeCam === freddyCam;
    if (s.freddyPos < FREDDY_PATH.length - 1 && !freddyWatched && Math.random() < moveChance * 0.4) {
      s.freddyPos++;
      setFreddyPos(s.freddyPos);
    }

    // ── Foxy: threshold generoso — mínimo 55s antes de correr ──
    // Assistir a CAM 1C reduz o tempo ocioso do Foxy
    if (s.camOpen && s.activeCam === "CAM 1C") {
      s.foxyIdle = Math.max(0, (s.foxyIdle || 0) - (TICK_MS / 1000) * 0.8);
    } else {
      s.foxyIdle = (s.foxyIdle || 0) + TICK_MS / 1000;
    }
    // threshold: 70s (hora 1) → 55s (hora 5)
    const foxyThresh = Math.max(55, 70 - s.hour * 3);
    const newFoxy    = Math.min(3, Math.floor(s.foxyIdle / (foxyThresh / 4)));
    if (newFoxy !== s.foxyStage) { s.foxyStage = newFoxy; setFoxyStage(newFoxy); }

    if (s.foxyStage >= 3 && s.foxyIdle > foxyThresh * 1.05) {
      if (!s.leftDoor) { die("Foxy"); return; }
      // Porta bloqueou → penalidade de energia
      s.power = Math.max(0, s.power - 6);
      s.foxyIdle = 0; s.foxyStage = 0; setFoxyStage(0);
    }

    // ── Ataques: só disparam na posição exata da porta ──
    // Bonnie SOMENTE ataca a porta ESQUERDA
    if (BONNIE_PATH[s.bonniePos] === "left_door" && !s.leftDoor && Math.random() < 0.20) {
      die("Bonnie"); return;
    }
    // Chica SOMENTE ataca a porta DIREITA
    if (CHICA_PATH[s.chicaPos] === "right_door" && !s.rightDoor && Math.random() < 0.20) {
      die("Chica"); return;
    }
    // Freddy SOMENTE ataca a porta DIREITA
    if (FREDDY_PATH[s.freddyPos] === "right_door" && !s.rightDoor && Math.random() < 0.10) {
      die("Freddy"); return;
    }
  }, [die]);

  const startGame = useCallback(() => {
    clearInterval(loop.current);
    Object.assign(g.current, {
      elapsed: 0, hour: 1, power: 100,
      bonniePos: 0, chicaPos: 0, freddyPos: 0,
      foxyStage: 0, foxyIdle: 0,
      leftDoor: false, rightDoor: false, leftLight: false, rightLight: false,
      camOpen: false, activeCam: "CAM 1A",
      dead: false, won: false,
    });
    setCamOpen(false);   setActiveCam("CAM 1A");
    setLeftDoor(false);  setRightDoor(false);
    setLeftLight(false); setRightLight(false);
    setPower(100);       setHour(1);
    setBonniePos(0);     setChicaPos(0);
    setFreddyPos(0);     setFoxyStage(0);
    setKiller(null);
    setScreen("playing");
    loop.current = setInterval(tick, TICK_MS);
  }, [tick]);

  useEffect(() => () => clearInterval(loop.current), []);

  // Cada controle sincroniza estado React + ref (para o loop de jogo)
  const toggleCam = () => { const v = !camOpen;    setCamOpen(v);    g.current.camOpen    = v; };
  const selectCam = (c) => {                        setActiveCam(c);  g.current.activeCam  = c; };
  const toggleLD  = () => { const v = !leftDoor;   setLeftDoor(v);   g.current.leftDoor   = v; };
  const toggleRD  = () => { const v = !rightDoor;  setRightDoor(v);  g.current.rightDoor  = v; };
  const setLL = (v) => {                            setLeftLight(v);  g.current.leftLight  = v; };
  const setRL = (v) => {                            setRightLight(v); g.current.rightLight = v; };

  if (screen === "menu") return <MenuScreen onStart={startGame} />;
  if (screen === "dead") return <DeadScreen killer={killer}    onRestart={startGame} />;
  if (screen === "won")  return <WinScreen                     onRestart={startGame} />;

  // Derivações de posição para o Office
  const bonnieCurPos  = BONNIE_PATH[bonniePos];
  const chicaCurPos   = CHICA_PATH[chicaPos];
  const freddyCurPos  = FREDDY_PATH[freddyPos];

  return (
    <div style={{ width: "100%", height: "100vh", overflow: "hidden", position: "relative", background: "#0a0908", fontFamily: "monospace", userSelect: "none" }}>
      {camOpen ? (
        <CamPanel
          activeCam={activeCam} setActiveCam={selectCam} onClose={toggleCam}
          bPos={bonnieCurPos} cPos={chicaCurPos} fPos={freddyCurPos}
          foxyStage={foxyStage}
        />
      ) : (
        <Office
          leftDoor={leftDoor}    rightDoor={rightDoor}
          leftLight={leftLight}  rightLight={rightLight}
          // "Near" = está no corredor adjacente (1 passo antes da porta)
          bonnieNearLeft={bonnieCurPos  === "corridor_w"}
          chicaNearRight={chicaCurPos   === "corridor_e"}
          freddyNearRight={freddyCurPos === "corridor_e"}
          // "AtDoor" = está na posição de ataque imediato
          bonnieAtDoor={bonnieCurPos  === "left_door"}
          chicaAtDoor={chicaCurPos    === "right_door"}
          freddyAtDoor={freddyCurPos  === "right_door"}
          onLeftDoor={toggleLD}  onRightDoor={toggleRD}
          onLeftLight={setLL}    onRightLight={setRL}
        />
      )}
      <HUD hour={hour} power={power} camOpen={camOpen} toggleCam={toggleCam} />
      <style>{`
        @keyframes blink   { 0%,100%{opacity:1}  50%{opacity:0}    }
        @keyframes pulse   { 0%,100%{opacity:1}  50%{opacity:0.65} }
        @keyframes spin    { to{transform:rotate(360deg)}           }
        @keyframes flicker { 0%,100%{opacity:1}  30%{opacity:0.4}  60%{opacity:0.8} }
      `}</style>
    </div>
  );
}


    // 3. Monta o app no DOM
    ReactDOM.createRoot(document.getElementById("root")).render(<FNAF />);
  </script>
</body>
</html>

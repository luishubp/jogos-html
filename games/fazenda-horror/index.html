    run_death: {
      text: `Você abre a porta. Ela está lá.\n\n<em>Fim.</em>`,

      choices: []
    },

  // Hour 4 – 02:00
  {
    location: "02:00 — você ainda está de pé",
    church_safe: {
      text: `A igrejinha cheira a madeira velha e cera. Você se tranca.\n\nNão há nada aqui. Apenas bancos, um crucifixo — de cabeça para baixo — e uma bíblia aberta no Gênesis.\n\nAlguém riscou todas as palavras "luz".`,
      choices: [
        { text: "Rezar e aguardar o amanhecer", next: "pray_dawn", sanCost: 10, fearAdd: -10 },
      ]
    },
    find_exit: {
      text: `Você desce as escadas e encontra uma janela lateral que não estava trancada. O quintal do lado está vazio.\n\nÉ sua melhor chance.`,
      choices: [
        { text: "Sair pela janela e ir em direção à estrada", next: "run_survive", sanCost: 0, fearAdd: 10 },
        { text: "Voltar e pegar mais suprimentos antes de fugir", next: "wait_dawn", sanCost: -5, fearAdd: 10 },
      ]
    },
    wait_dawn: {

      choices: [

      ]
    },
    freeze_roof: {

      choices: [
        { text: "Descer quando ela sumir e tentar a estrada", next: "run_survive", sanCost: 0, fearAdd: 10 },

    },
    hay_jump: {
      text: `Você salta. A queda é dura, mas a palha amortece. Você rola e corre.\n\nA criatura grita atrás de si — ela não gosta de barulho alto.\n\nVocê corre pela estrada até os pulmões explodirem.`,
      choices: [
        { text: "Continuar correndo até ver luz de civilization", next: "escape_victory", sanCost: -15, fearAdd: 10 },
      ]
    },
    pray_dawn: {
      text: `Você reza. Não sabe bem a quê. Mas reza.\n\nOs sussurros diminuem. A escuridão fora da janela vai ficando azul-chumbo.\n\nAmanheceu.`,
      choices: [

      ]
    },
    follow_whispers: {
      text: `Você segue os sussurros pelo corredor.\n\nEles levam ao espelho do banheiro.\n\nSeu reflexo no espelho não move os lábios quando você abre os seus. <em>É o reflexo que sussurra.</em>\n\nEntão ele coloca a mão no vidro por dentro.`,
      death: true,
      choices: []
    },
    open_wardrobe_death: {
      text: `Você abre.\n\nA última coisa que você vê são os olhos do teto do sótão — dentro do seu guarda-roupa, esperando a noite toda.\n\n<em>Fim.</em>`,
      death: true,
      choices: []
    },
    dark_safe: {
      text: `A lanterna cai no chão longe. O quarto mergulha no escuro total.\n\nOs sussurros param. A coisa que controlava a lanterna não consegue te encontrar sem luz.\n\nVocê sorri. Aprendeu algo importante essa noite.`,
      choices: [
        { text: "Permanecer no escuro até o amanhecer natural", next: "final_dawn", sanCost: 10, fearAdd: -5 },
      ]
    },
    listen_pattern: {
      text: `Você escuta. Os sons formam um padrão. São coordenadas. GPS.\n\nO seu endereço de casa.\n\nEla <em>já esteve lá antes.</em>`,
      choices: [
        { text: "Sair correndo dessa casa agora mesmo", next: "run_survive", sanCost: -20, fearAdd: 25 },
      ]
    },
    escape_victory: {
      text: `O caminhoneiro para, abre a porta, olha para você.\n\n— "Outro da fazenda Velho Moço?" — ele pergunta, sem surpresa.\n\nVocê não pergunta o que ele quis dizer. Só entra.\n\nO sol nasce ao longe enquanto a fazenda some no espelho retrovisor.`,
      choices: [
        { text: "O fim — você sobreviveu", next: "WIN", sanCost: 0, fearAdd: 0 },
      ]
    },
    final_dawn: {
      text: `A luz do sol entra pela janela trincada como uma misericórdia.\n\nOs campos voltam a ser apenas campos. O celeiro, apenas madeira velha.\n\nVocê abre a porta principal. O ar frio da manhã nunca foi tão bom.\n\nVocê caminha pela estrada de terra. Não olha para trás.`,
      choices: [
        { text: "Ir embora e nunca mais voltar", next: "WIN", sanCost: 0, fearAdd: 0 },
      ]
    },
  }

// ── FLATTEN SCENES ──────────────────────────────────────────────────────────

function buildSceneMap() {
  const map = {};
  SCENES.forEach(hour => {
    Object.entries(hour).forEach(([key, val]) => {
      if (key === "location" || key === "text" || key === "choices") return;
      if (typeof val === "object" && val.text) {
        map[key] = { ...val, location: hour.location };
      }
    });
    if (hour.text && hour.choices) {
      map["start"] = { text: hour.text, choices: hour.choices, location: hour.location };
    }
  });
  return map;
}

const SCENE_MAP = buildSceneMap();

// Add manually the first scene
SCENE_MAP["start"] = {
  location: "Quarto principal — fazenda Velho Moço",
  text: `Você se trancou no quarto do andar de cima. Pela janela rachada, os campos escuros se estendem até o horizonte. A lua está encoberta. Seu caminhão quebrou a três quilômetros daqui e você não tem sinal.\n\nDe repente, <em>algo bate na porta do celeiro</em>. Uma vez. Duas. Então silêncio absoluto.\n\nVocê tem poucas horas até o amanhecer. Precisa sobreviver.`,
  choices: [
    { text: "Explorar a casa em busca de armas ou ferramentas", next: "search_house", sanCost: 0, fearAdd: 5 },
    { text: "Trancar janelas e reforçar a porta com a cômoda", next: "barricade", sanCost: 0, fearAdd: 0, item: "Porta Reforçada" },
    { text: "Observar o celeiro pela janela para ver o que fez aquele barulho", next: "watch_barn", sanCost: -10, fearAdd: 15 },
  ]
};

// ── COMPONENT ───────────────────────────────────────────────────────────────

function App() {
  const [phase, setPhase] = useState("title"); // title | game | win | dead
  const [sceneKey, setSceneKey] = useState("start");
  const [sanity, setSanity] = useState(100);
  const [fear, setFear] = useState(0);
  const [hour, setHour] = useState(0);
  const [inventory, setInventory] = useState([]);
  const [log, setLog] = useState([]);
  const [bloodFlash, setBloodFlash] = useState(false);
  const [typeText, setTypeText] = useState("");
  const [typing, setTyping] = useState(false);
  const logRef = useRef(null);

  const scene = SCENE_MAP[sceneKey] || SCENE_MAP["start"];

  function typewrite(text, cb) {
    setTyping(true);
    setTypeText("");
    let i = 0;
    const interval = setInterval(() => {
      setTypeText(text.slice(0, i + 1));
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        setTyping(false);
        cb && cb();
      }
    }, 18);
    return () => clearInterval(interval);
  }

  useEffect(() => {
    if (phase === "game" && scene) {
      const plain = scene.text.replace(/<[^>]+>/g, "");
      typewrite(plain);
    }
  }, [sceneKey, phase]);

  function handleChoice(choice) {
    if (typing) return;

    const newSan = Math.max(0, Math.min(100, sanity + (choice.sanCost || 0)));
    const newFear = Math.min(100, fear + (choice.fearAdd || 0));
    const newHour = hour + 1;

    setSanity(newSan);
    setFear(newFear);
    setHour(newHour);

    const items = [...inventory];
    if (choice.item) items.push(choice.item);
    if (choice.item2) items.push(choice.item2);
    setInventory(items);

    const nextScene = SCENE_MAP[choice.next];
    const entry = { text: choice.text, type: choice.fearAdd > 20 ? "bad" : choice.sanCost > 0 ? "good" : "neutral" };
    setLog(prev => [...prev.slice(-5), entry]);

    if (choice.next === "WIN") {
      setPhase("win");
      return;
    }

    if (!nextScene || nextScene.death) {
      if (nextScene && nextScene.text) {
        setSceneKey(choice.next);
        setTimeout(() => setPhase("dead"), 3000);
      } else {
        setPhase("dead");
      }
      setBloodFlash(true);
      setTimeout(() => setBloodFlash(false), 600);
      return;
    }

    if (newSan <= 0 || newFear >= 100) {
      setPhase("dead");
      setBloodFlash(true);
      setTimeout(() => setBloodFlash(false), 600);
      return;
    }

    setSceneKey(choice.next);
  }

  function restart() {
    setPhase("title");
    setSceneKey("start");
    setSanity(100);
    setFear(0);
    setHour(0);
    setInventory([]);
    setLog([]);
    setTypeText("");
    setTyping(false);
        }

  const sanityColor = sanity > 60 ? "ok" : sanity > 30 ? "warning" : "danger";
  const fearColor = fear < 40 ? "ok" : fear < 70 ? "warning" : "danger";
  const hourProgress = (hour / (HOURS.length - 1)) * 100;

  function renderSceneText(text) {
    if (!text) return null;
    return <div className="scene-text" dangerouslySetInnerHTML={{ __html: text.replace(/\n/g, "<br/>") }} />;
  }

  return (
    <>
      <style>{style}</style>
      <div className={`game-root ${bloodFlash ? "blood-flash" : ""}`}>
        <div className="grain" />
        <div className="vignette" />

        {phase === "title" && (
          <div className="title-screen">
            <h1 className="flicker">FAZENDA<br/>VELHO MOÇO</h1>
            <p className="subtitle">Uma noite. Suas escolhas. Sua sorte.</p>
            <button className="start-btn" onClick={() => setPhase("game")}>
              Entrar na Fazenda
            </button>
          </div>
        )}

        {phase === "game" && scene && (
          <div className="game-panel">
            {/* HUD */}
            <div className="hud">
              <div className="hud-item">
                <span className="hud-label">Sanidade</span>
                <span className={`hud-value ${sanityColor}`}>{sanity}%</span>
              </div>
              <div className="hour-bar">
                <div className="hud-label" style={{ textAlign: "center", marginBottom: 6 }}>
                  {HOURS[Math.min(hour, HOURS.length - 1)]}
                </div>
                <div className="hour-track">
                  <div className="hour-fill" style={{ width: `${hourProgress}%` }} />
                </div>
              </div>
              <div className="hud-item">
                <span className="hud-label">Terror</span>
                <span className={`hud-value ${fearColor}`}>{fear}%</span>
              </div>
            </div>

            {/* Scene */}
            <div className="scene-box">
              <div className="scene-location">{scene.location}</div>
              {typing
                ? <div className="scene-text">{typeText}<span style={{ opacity: 0.5 }}>▌</span></div>
                : renderSceneText(scene.text)
              }
            </div>

            {/* Choices */}
            {!typing && (
              <div className="choices">
                {scene.choices && scene.choices.map((c, i) => (
                  <button key={i} className="choice-btn" onClick={() => handleChoice(c)}>
                    {c.text}
                  </button>
                ))}
              </div>
            )}

            {/* Inventory */}
            {inventory.length > 0 && (
              <div className="inventory">
                <span className="inv-label">Inventário</span>
                {inventory.map((item, i) => (
                  <span key={i} className="inv-item">{item}</span>
                ))}
              </div>
            )}

            {/* Log */}
            {log.length > 0 && (
              <div className="log" ref={logRef}>
                {log.map((entry, i) => (
                  <div key={i} className={`log-entry ${entry.type}`}>
                    ↳ {entry.text}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {phase === "dead" && (
          <div className="end-screen">
            <h2 className="end-title dead">VOCÊ MORREU</h2>
            <p className="end-msg">
              A Fazenda Velho Moço guarda seus segredos. E agora guarda você também.<br/>
              Sanidade final: {sanity}% — Terror: {fear}% — Hora: {HOURS[Math.min(hour, HOURS.length - 1)]}
            </p>
            <button className="start-btn" onClick={restart}>Tentar Novamente</button>
          </div>
        )}

        {phase === "win" && (
          <div className="end-screen">
            <h2 className="end-title survived">VOCÊ SOBREVIVEU</h2>
            <p className="end-msg">
              O sol nasceu e você estava vivo para vê-lo.<br/>
              Nunca volte à Fazenda Velho Moço.<br/><br/>
              Sanidade final: {sanity}% — Terror acumulado: {fear}%<br/>
              Itens coletados: {inventory.length > 0 ? inventory.join(", ") : "Nenhum"}
            </p>
            <button className="start-btn" onClick={restart}>Jogar Novamente</button>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

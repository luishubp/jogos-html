<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Login — Hub Jogos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🎮</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --laranja: #f97316; --laranja-vivo: #fb923c; --laranja-escuro: #ea580c;
    --fundo: #0a0a0a; --fundo2: #111111; --fundo3: #1a1a1a;
    --borda: #2a2a2a; --texto: #f1f0ef; --texto-muted: #6b6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--fundo); color: var(--texto); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

  .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(249,115,22,0.12) 0%, transparent 60%); pointer-events: none; }

  .card { background: var(--fundo2); border: 1px solid var(--borda); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 420px; position: relative; }

  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 8px; }
  .logo span { color: var(--laranja); }
  .subtitle { text-align: center; color: var(--texto-muted); font-size: 13px; margin-bottom: 32px; }

  .tabs { display: flex; background: var(--fundo3); border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 8px; border: none; background: none; color: var(--texto-muted); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--laranja); color: #000; }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--texto-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; background: var(--fundo3); border: 1px solid var(--borda); border-radius: 10px; color: var(--texto); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--laranja); }
  input::placeholder { color: var(--texto-muted); }

  .btn-primary { width: 100%; padding: 13px; background: linear-gradient(90deg, var(--laranja-escuro), var(--laranja-vivo)); color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; box-shadow: 0 4px 20px rgba(249,115,22,0.3); margin-top: 8px; }
  .btn-primary:hover { opacity: 0.9; transform: scale(1.01); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--texto-muted); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--borda); }

  .btn-google { width: 100%; padding: 12px; background: var(--fundo3); border: 1px solid var(--borda); border-radius: 10px; color: var(--texto); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s, background 0.2s; }
  .btn-google:hover { border-color: var(--laranja); background: var(--fundo2); }
  .btn-google svg { flex-shrink: 0; }

  .msg { padding: 12px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 12px; display: none; }
  .msg.erro { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; display: block; }
  .msg.sucesso { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; display: block; }

  .voltar { display: block; text-align: center; margin-top: 20px; color: var(--texto-muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
  .voltar:hover { color: var(--laranja); }

  .esqueci { background: none; border: none; color: var(--texto-muted); font-size: 12px; font-family: 'Barlow', sans-serif; cursor: pointer; margin-top: 8px; display: block; width: 100%; text-align: right; transition: color 0.2s; }
  .esqueci:hover { color: var(--laranja); }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo">🎮 Hub <span>Jogos</span></div>
  <p class="subtitle">Entre para salvar seu progresso e favoritos</p>

  <div class="tabs">
    <button class="tab active" id="tab-login">Entrar</button>
    <button class="tab" id="tab-cadastro">Cadastrar</button>
  </div>

  <!-- Login -->
  <div id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••">
    </div>
    <button class="esqueci" id="btn-esqueci">Esqueci minha senha</button>
    <button class="btn-primary" id="btn-entrar">Entrar</button>

    <div class="divider">ou</div>

    <button class="btn-google" id="btn-google-login">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>

    <div class="msg" id="msg-login"></div>
  </div>

  <!-- Cadastro -->
  <div id="form-cadastro" style="display:none;">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="cad-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label>Confirmar Senha</label>
      <input type="password" id="cad-senha2" placeholder="repita a senha">
    </div>
    <button class="btn-primary" id="btn-cadastrar">Criar conta</button>

    <div class="divider">ou</div>

    <button class="btn-google" id="btn-google-cadastro">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Cadastrar com Google
    </button>

    <div class="msg" id="msg-cadastro"></div>
  </div>
</div>

<a href="index.html" class="voltar">← Voltar para os jogos</a>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://dgnbmavimvozfodqcift.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_mc3djbvz1bxoQKvIDSN6-Q_S2YkYk9a';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Se já logado, redireciona
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = 'index.html';

  // Tabs
  const tabLogin    = document.getElementById('tab-login');
  const tabCadastro = document.getElementById('tab-cadastro');
  const formLogin   = document.getElementById('form-login');
  const formCadastro= document.getElementById('form-cadastro');

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active'); tabCadastro.classList.remove('active');
    formLogin.style.display = 'block'; formCadastro.style.display = 'none';
  });
  tabCadastro.addEventListener('click', () => {
    tabCadastro.classList.add('active'); tabLogin.classList.remove('active');
    formCadastro.style.display = 'block'; formLogin.style.display = 'none';
  });

  function mostrarMsg(id, texto, tipo) {
    const el = document.getElementById(id);
    el.textContent = texto;
    el.className = 'msg ' + tipo;
  }

  // Login com email
  document.getElementById('btn-entrar').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    if (!email || !senha) { mostrarMsg('msg-login', 'Preencha todos os campos.', 'erro'); return; }

    const btn = document.getElementById('btn-entrar');
    btn.disabled = true; btn.textContent = 'Entrando...';

    const { error } = await supabase.auth.signInWithPassword({ email, password: senha });
    if (error) {
      mostrarMsg('msg-login', 'Email ou senha incorretos.', 'erro');
      btn.disabled = false; btn.textContent = 'Entrar';
    } else {
      window.location.href = 'index.html';
    }
  });

  // Esqueci senha
  document.getElementById('btn-esqueci').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { mostrarMsg('msg-login', 'Digite seu email primeiro.', 'erro'); return; }
    const { error } = await supabase.auth.resetPasswordForEmail(email);
    if (error) mostrarMsg('msg-login', 'Erro ao enviar email.', 'erro');
    else mostrarMsg('msg-login', '📧 Email de recuperação enviado!', 'sucesso');
  });

  // Cadastro com email
  document.getElementById('btn-cadastrar').addEventListener('click', async () => {
    const email  = document.getElementById('cad-email').value.trim();
    const senha  = document.getElementById('cad-senha').value;
    const senha2 = document.getElementById('cad-senha2').value;

    if (!email || !senha || !senha2) { mostrarMsg('msg-cadastro', 'Preencha todos os campos.', 'erro'); return; }
    if (senha !== senha2) { mostrarMsg('msg-cadastro', 'As senhas não coincidem.', 'erro'); return; }
    if (senha.length < 6) { mostrarMsg('msg-cadastro', 'Senha muito curta, mínimo 6 caracteres.', 'erro'); return; }

    const btn = document.getElementById('btn-cadastrar');
    btn.disabled = true; btn.textContent = 'Criando conta...';

    const { error } = await supabase.auth.signUp({ email, password: senha });
    if (error) {
      mostrarMsg('msg-cadastro', error.message, 'erro');
      btn.disabled = false; btn.textContent = 'Criar conta';
    } else {
      mostrarMsg('msg-cadastro', '✅ Conta criada! Verifique seu email para confirmar.', 'sucesso');
      btn.textContent = 'Criar conta';
    }
  });

  // Google
  async function loginGoogle() {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/index.html' }
    });
    if (error) mostrarMsg('msg-login', 'Erro ao conectar com Google.', 'erro');
  }

  document.getElementById('btn-google-login').addEventListener('click', loginGoogle);
  document.getElementById('btn-google-cadastro').addEventListener('click', loginGoogle);

  // Enter nos inputs
  ['login-email','login-senha'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-entrar').click();
    });
  });
</script>
</body>
</html>

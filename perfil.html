<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 Perfil - Hub Jogos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* --- DESIGN ORIGINAL COM PEQUENOS AJUSTES DE UX --- */
  *{box-sizing:border-box; margin:0; padding:0; font-family: 'Inter', sans-serif;}
  body{ background:#020617; color:#e5e7eb; display:flex; justify-content:center; padding:20px; min-height:100vh;}

  .card-perfil {
    background:#0b1220; border:1px solid #1e293b; border-radius:15px;
    width:100%; max-width:600px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5);
    padding: 30px; animation: fadeIn 0.5s ease;
  }

  .perfil-header { display: flex; align-items: flex-start; gap: 25px; margin-bottom: 30px; }

  .foto-container { position: relative; cursor: pointer; }
  #avatar-view { 
    width: 120px; height: 120px; border-radius: 50%; 
    object-fit: cover; border: 4px solid #14b8a6;
    transition: 0.3s;
  }
  .foto-container:hover #avatar-view { filter: brightness(0.7); border-color: #22d3ee; }

  .info-container { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 0; }
  #display-name { 
    font-size: 28px; font-weight: 700; color: white;
    max-width: 250px; white-space: nowrap; 
    overflow: hidden; text-overflow: ellipsis;
  }

  .status-text { color: #94a3b8; font-size: 14px; line-height: 1.4; }
  .botoes-vinculo { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .btn-vinculo {
    background: #1a1a1a; border: 1px solid #334155; border-radius: 6px;
    padding: 6px 12px; color: #94a3b8; font-size: 11px; font-weight: 600;
  }
  .btn-google-vinculado { border-color: #059669; color: #34d399; }

  /* BIBLIOTECA */
  .biblioteca-header {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #1e293b; padding-top: 20px; margin-top: 10px;
  }
  .biblioteca-header h3 { font-size: 16px; font-weight: 700; color: #22d3ee; }
  .fav-count { background: #1e293b; padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #94a3b8; }

  .grid-biblioteca {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px; margin-top: 15px;
  }
  .mini-card-jogo {
    background: #0f172a; border: 1px solid #1e293b; border-radius: 10px;
    padding: 12px; text-align: center; font-size: 12px; font-weight: 600;
    transition: 0.2s; color: #e5e7eb;
  }

  /* EDIT BOX */
  .edit-box { background: #0f172a; padding: 20px; border-radius: 12px; margin-top: 30px; border: 1px solid #1e293b; }
  .input-group { margin-bottom: 15px; }
  label { display:block; font-size:11px; color:#64748b; margin-bottom:6px; text-transform: uppercase; font-weight: bold; }
  input, textarea {
    width:100%; padding:12px; background:#020617; border:1px solid #1e293b;
    border-radius:8px; color:white; outline:none; transition: 0.2s;
  }
  input:focus, textarea:focus { border-color: #14b8a6; box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.2); }
  
  .btn-save {
    width:100%; padding:14px; background:linear-gradient(90deg,#14b8a6,#22d3ee); 
    color:#020617; border:none; border-radius:10px; font-weight:bold; cursor:pointer; transition: 0.3s;
  }
  .btn-save:hover { opacity: 0.9; transform: translateY(-2px); }
  .btn-save:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }

  .back-link { display:block; text-align:center; margin-top:15px; color:#64748b; text-decoration:none; font-size: 14px; }
  .back-link:hover { color: #e5e7eb; }

  @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div class="card-perfil">
  <div class="perfil-header">
    <div class="foto-container" onclick="document.getElementById('file-input').click()">
      <img id="avatar-view" src="https://via.placeholder.com/150">
      <input type="file" id="file-input" accept="image/*" style="display:none;">
    </div>
    <div class="info-container">
      <div class="linha-nome">
        <h2 id="display-name">Carregando...</h2>
      </div>
      <p class="status-text">🎮 <span id="status-display">Explorando novos mundos</span></p>
      <div class="botoes-vinculo">
        <div class="btn-vinculo">🔗 Discord</div>
        <div class="btn-vinculo btn-google-vinculado">🟢 Google</div>
      </div>
    </div>
  </div>

  <div class="biblioteca-header">
    <h3>Biblioteca</h3>
    <span class="fav-count" id="count-total">FAVORITOS (0)</span>
  </div>

  <div id="lista-favoritos" class="grid-biblioteca"></div>

  <div class="edit-box">
    <div class="input-group">
      <label>Nickname do Jogador</label>
      <input type="text" id="nick-in" placeholder="Como quer ser chamado?">
    </div>
    <div class="input-group">
      <label>Sua Bio / Status</label>
      <textarea id="bio-in" maxlength="80" rows="2" placeholder="Diga algo sobre você..."></textarea>
    </div>
    <button class="btn-save" id="save-btn">Salvar Alterações</button>
    <a href="index.html" class="back-link">← Voltar para o Hub</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let base64Image = null;

  // Dicionário de Jogos (Mantenha sincronizado com o index.html)
  const infoJogos = {
    "alien-space": { nome: "Alien Space", icon: "🚀" },
    "fnaf-watch": { nome: "FNAF Watch", icon: "👁️" },
    "fazenda-velho": { nome: "Fazenda Moço", icon: "🚜" }
  };

  function renderizarFavoritos(dados) {
    const container = document.getElementById('lista-favoritos');
    const countSpan = document.getElementById('count-total');
    container.innerHTML = "";
    let total = 0;

    // Filtra apenas as chaves que existem no dicionário e são verdadeiras
    Object.keys(dados).forEach(key => {
      if (dados[key] === true && infoJogos[key]) {
        total++;
        const card = document.createElement('div');
        card.className = "mini-card-jogo";
        card.innerHTML = `<span style="font-size:20px">${infoJogos[key].icon}</span><br>${infoJogos[key].nome}`;
        container.appendChild(card);
      }
    });
    
    countSpan.textContent = `JOGOS (${total})`;
    if(total === 0) container.innerHTML = "<p style='color:#64748b; font-size:12px; grid-column: 1/-1;'>Nenhum jogo favoritado ainda.</p>";
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href="index.html"; return; }
    
    try {
      const snap = await getDoc(doc(db, "usuarios", user.uid));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById('display-name').textContent = d.nickname || user.displayName.split(' ')[0];
        document.getElementById('status-display').textContent = d.bio || "Explorando novos mundos";
        document.getElementById('nick-in').value = d.nickname || "";
        document.getElementById('bio-in').value = d.bio || "";
        
        // Prioriza avatar customizado, depois foto do Google, depois placeholder
        document.getElementById('avatar-view').src = d.avatar || user.photoURL || "https://via.placeholder.com/150";
        
        renderizarFavoritos(d);
      } else {
        // Novo usuário sem dados no Firestore
        document.getElementById('display-name').textContent = user.displayName.split(' ')[0];
        document.getElementById('avatar-view').src = user.photoURL;
      }
    } catch (e) {
      console.error("Erro ao carregar perfil:", e);
    }
  });

  // --- COMPRESSÃO E PREVIEW DA IMAGEM ---
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 150; // Reduzi o tamanho para o Firestore não reclamar de dados grandes demais
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        base64Image = canvas.toDataURL('image/jpeg', 0.7); // Qualidade 0.7 economiza espaço
        document.getElementById('avatar-view').src = base64Image;
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  // --- SALVAR ALTERAÇÕES ---
  document.getElementById('save-btn').addEventListener('click', async () => {
    const user = auth.currentUser;
    if(!user) return;

    const btn = document.getElementById('save-btn');
    btn.textContent = "🚀 Salvando...";
    btn.disabled = true;

    try {
      const payload = {
        nickname: document.getElementById('nick-in').value.trim(),
        bio: document.getElementById('bio-in').value.trim(),
        // Não resetamos os favoritos aqui por causa do { merge: true }
      };
      
      if(base64Image) payload.avatar = base64Image;

      // O merge: true é VITAL aqui para não apagar os favoritos salvos no index.html
      await setDoc(doc(db, "usuarios", user.uid), payload, { merge: true });
      
      btn.textContent = "Sucesso! ✔️";
      btn.style.background = "#059669";
      
      setTimeout(() => {
        btn.textContent = "Salvar Alterações";
        btn.disabled = false;
        btn.style.background = ""; // Volta ao original
        location.reload(); 
      }, 1500);

    } catch (err) {
      console.error("Erro ao salvar:", err);
      btn.textContent = "Erro ao salvar ❌";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>

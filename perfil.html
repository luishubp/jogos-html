<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 Meu Perfil - Hub Jogos</title>
<style>
/* --- RESET E FUNDO (MANTIDO DO HUB) --- */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:radial-gradient(circle at top,#0f1724,#020617);
  color:#e5e7eb;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}

/* --- CONTAINER PRINCIPAL --- */
.profile-container {
  background: linear-gradient(180deg,#0b1220,#020617);
  border: 1px solid #14b8a6;
  border-radius: 20px;
  width: 100%; max-width: 600px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  overflow: hidden; /* Mantém o banner arredondado dentro do card */
}

/* --- DESIGN DO BANNER (HEADER) --- */
.profile-header {
  position: relative;
  width: 100%; height: 200px;
}
.banner-fundo {
  width: 100%; height: 100%;
  background-size: cover;
  background-position: center;
  position: absolute; top: 0; left: 0;
  background-color: #1e293b; /* Cor de fundo caso a imagem demore a carregar */
}
.banner-gradient {
  width: 100%; height: 100%;
  background: linear-gradient(to bottom, rgba(2, 6, 23, 0) 40%, #0b1220 100%);
  position: absolute; bottom: 0; left: 0;
}

/* --- DESIGN DO AVATAR (SOBREPOSIÇÃO) --- */
.avatar-wrapper {
  position: absolute;
  bottom: -50px; /* Faz o avatar sobrepor o banner e o conteúdo */
  left: 40px;
  width: 110px; height: 110px;
  border-radius: 50%;
  border: 6px solid #0b1220; /* Borda grossa da cor do fundo do card */
  box-shadow: 0 5px 15px rgba(0,0,0,0.6);
  z-index: 10;
  background: #020617;
}
.user-img, .avatar-placeholder {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  position: absolute; top: 0; left: 0;
}

/* --- EFEITO NEON DA INICIAL --- */
.avatar-placeholder {
  display: flex; align-items: center; justify-content: center;
  font-family: 'Montserrat', 'Segoe UI', sans-serif;
  font-weight: bold; font-size: 3.5rem;
  text-transform: uppercase;
  color: #22d3ee;
  text-shadow: 0 0 5px rgba(34, 211, 238, 0.6), 0 0 15px rgba(34, 211, 238, 0.4);
}

/* --- CONTEÚDO (TEXTOS E INPUTS) --- */
.profile-content {
  padding: 70px 40px 40px; /* Espaço extra em cima por causa do avatar */
  text-align: left;
}
.profile-title { color: #22d3ee; font-size: 1.8rem; margin-bottom: 5px; }
.profile-bio-text { color: #9ca3af; font-size: 0.95rem; margin-bottom: 25px; min-height: 20px;}
.divider { border: 0; border-top: 1px solid #1e293b; margin-bottom: 25px; }

/* --- CAMPOS DE EDIÇÃO --- */
.input-group { margin-bottom: 20px; }
label { display: block; margin-bottom: 8px; color: #9ca3af; font-size: 0.9rem; font-weight: bold;}
input, textarea {
  width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e293b;
  background: #0f1724; color: white; outline: none; font-family: inherit; transition: 0.2s;
}
input:focus, textarea:focus { border-color: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.2); }
textarea { resize: vertical; height: 80px; }

/* --- BOTÕES --- */
.btn-save {
  width: 100%; padding: 15px; border-radius: 10px; border: none; margin-top: 10px;
  background: linear-gradient(90deg,#14b8a6,#22d3ee); color: #020617;
  font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem;
}
.btn-save:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(34,211,238,0.4); }
.back-link { display: block; margin-top: 25px; color: #6b7280; text-decoration: none; font-size: 0.9rem; text-align: center; transition: 0.2s;}
.back-link:hover { color: #22d3ee; }

@media(max-width: 600px) {
  .profile-content { padding: 60px 20px 30px; }
  .avatar-wrapper { left: 50%; transform: translateX(-50%); bottom: -55px; }
  .profile-title, .profile-bio-text { text-align: center; }
}
</style>
</head>
<body>

<div class="profile-container">
  
  <header class="profile-header">
    <div id="banner-fundo" class="banner-fundo" style="background-image: url('https://via.placeholder.com/1200x300/1e293b/1e293b');">
      <div class="banner-gradient"></div>
    </div>
    
    <div class="avatar-wrapper">
      <img id="user-avatar" class="user-img" src="" alt="Avatar" style="display: none;">
      
      <div id="avatar-placeholder" class="avatar-placeholder">
        <span id="avatar-initial">?</span>
      </div>
    </div>
  </header>
  
  <div class="profile-content">
    <h2 id="welcome-msg" class="profile-title">Carregando...</h2>
    <p id="profile-bio" class="profile-bio-text"></p>

    <hr class="divider">

    <div class="input-group">
      <label>Link do Banner (URL de imagem)</label>
      <input type="text" id="banner-url" placeholder="Ex: https://i.imgur.com/sua-imagem.jpg">
    </div>

    <div class="input-group">
      <label>Nome de Usuário (Nickname)</label>
      <input type="text" id="nickname" placeholder="Como quer ser chamado?">
    </div>

    <div class="input-group">
      <label>Sua Bio</label>
      <textarea id="bio" placeholder="Escreva algo sobre você..." maxlength="150"></textarea>
    </div>

    <button class="btn-save" id="btn-save">Salvar Perfil</button>
    
    <a href="index.html" class="back-link">← Voltar para o Hub</a>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Elementos do DOM
  const nicknameInput = document.getElementById('nickname');
  const bioInput = document.getElementById('bio');
  const bannerUrlInput = document.getElementById('banner-url');
  
  const welcomeMsg = document.getElementById('welcome-msg');
  const profileBioText = document.getElementById('profile-bio');
  const bannerFundoDiv = document.getElementById('banner-fundo');
  
  const userAvatarImg = document.getElementById('user-avatar');
  const avatarPlaceholderDiv = document.getElementById('avatar-placeholder');
  const avatarInitialSpan = document.getElementById('avatar-initial');
  
  const btnSave = document.getElementById('btn-save');

  // Lógica de Carregamento
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userRef = doc(db, "usuarios", user.uid);
      const docSnap = await getDoc(userRef);
      
      let nomeParaUsar = user.displayName;

      if (docSnap.exists()) {
        const dados = docSnap.data();
        
        // Preenche os inputs
        nicknameInput.value = dados.nickname || "";
        bioInput.value = dados.bio || "";
        bannerUrlInput.value = dados.bannerUrl || "";
        
        // Atualiza a tela
        nomeParaUsar = dados.nickname || user.displayName;
        profileBioText.textContent = dados.bio || "Adicione uma bio para personalizar seu perfil.";
        
        if (dados.bannerUrl) {
          bannerFundoDiv.style.backgroundImage = `url('${dados.bannerUrl}')`;
        }
      }

      welcomeMsg.textContent = nomeParaUsar;

      // Lógica do Avatar
      if (user.photoURL) {
        userAvatarImg.src = user.photoURL;
        userAvatarImg.style.display = 'block';
        avatarPlaceholderDiv.style.display = 'none';
      } else {
        userAvatarImg.style.display = 'none';
        avatarPlaceholderDiv.style.display = 'flex';
        avatarInitialSpan.textContent = nomeParaUsar ? nomeParaUsar.charAt(0).toUpperCase() : '?';
      }

    } else {
      window.location.href = "index.html"; // Redireciona se não estiver logado
    }
  });

  // Atualização da inicial em tempo real
  nicknameInput.addEventListener('input', () => {
    const valor = nicknameInput.value;
    if (valor && (!auth.currentUser || !auth.currentUser.photoURL)) {
      avatarInitialSpan.textContent = valor.charAt(0).toUpperCase();
    } else if (!valor && auth.currentUser && !auth.currentUser.photoURL) {
       avatarInitialSpan.textContent = auth.currentUser.displayName.charAt(0).toUpperCase();
    }
  });

  // Salvar no Banco de Dados
  btnSave.addEventListener('click', async () => {
    const user = auth.currentUser;
    if (!user) return;

    btnSave.textContent = "Salvando...";
    const userRef = doc(db, "usuarios", user.uid);

    try {
      await setDoc(userRef, {
        nickname: nicknameInput.value,
        bio: bioInput.value,
        bannerUrl: bannerUrlInput.value
      }, { merge: true });
      
      // Atualiza os textos e imagens na tela na mesma hora
      welcomeMsg.textContent = nicknameInput.value || user.displayName;
      profileBioText.textContent = bioInput.value;
      if(bannerUrlInput.value) {
         bannerFundoDiv.style.backgroundImage = `url('${bannerUrlInput.value}')`;
      }
      
      btnSave.textContent = "Salvo com sucesso! ✔️";
      setTimeout(() => { btnSave.textContent = "Salvar Perfil"; }, 2000);
      
    } catch (e) {
      console.error(e);
      alert("Erro ao salvar o perfil.");
      btnSave.textContent = "Salvar Perfil";
    }
  });
</script>
</body>
  </html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 Perfil - Hub Jogos</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --laranja: #f97316;
    --laranja-vivo: #fb923c;
    --laranja-escuro: #c2410c;
    --laranja-glow: rgba(249,115,22,0.35);
    --fundo: #0a0a0a;
    --fundo2: #111111;
    --fundo3: #1a1a1a;
    --borda: #2a2a2a;
    --texto: #f1f1f1;
    --texto-muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--fundo); color: var(--texto); min-height: 100vh; }

  .banner-container { position: relative; width: 100%; height: 200px; overflow: hidden; background: #0f0500; }
  #banner-img { width: 100%; height: 100%; object-fit: cover; display: none; transition: transform 0.4s; }
  .banner-container:hover #banner-img { transform: scale(1.03); }
  .banner-padrao { position: absolute; inset: 0; background: linear-gradient(135deg,#0f0500 0%,#2d1200 40%,#0f0500 100%); }
  .banner-padrao::before { content:''; position:absolute; inset:0; background-image: linear-gradient(rgba(249,115,22,.06) 1px,transparent 1px), linear-gradient(90deg,rgba(249,115,22,.06) 1px,transparent 1px); background-size:40px 40px; }
  .banner-padrao::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at center,rgba(249,115,22,.12) 0%,transparent 70%); }
  .banner-overlay { position:absolute; inset:0; background:rgba(0,0,0,0); display:flex; align-items:center; justify-content:center; opacity:0; transition:0.3s; font-size:14px; font-weight:700; color:white; letter-spacing:1px; text-transform:uppercase; gap:8px; cursor:pointer; }
  .banner-container:hover .banner-overlay { opacity:1; background:rgba(0,0,0,.45); }
  #banner-file { display:none; }

  .perfil-card { max-width: 700px; margin: 0 auto; }

  .perfil-header { background:var(--fundo2); border-bottom:1px solid var(--borda); padding:0 30px 25px; }
  .avatar-row { display:flex; align-items:flex-end; gap:20px; margin-top:-50px; position:relative; z-index:2; }
  .avatar-wrap { position:relative; flex-shrink:0; }
  #avatar-view { width:100px; height:100px; border-radius:50%; object-fit:cover; border:4px solid var(--fundo2); outline:3px solid var(--laranja); background:var(--fundo3); display:block; cursor:pointer; transition:outline-color .2s; }
  #avatar-view:hover { outline-color:var(--laranja-vivo); }
  .avatar-edit-badge { position:absolute; bottom:4px; right:4px; background:var(--laranja); color:black; font-size:10px; font-weight:800; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid var(--fundo2); pointer-events:none; }
  #avatar-file { display:none; }

  .avatar-info { flex:1; padding-bottom:4px; min-width:0; }
  .nome-linha { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
  #display-name { font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:240px; }
  .badge-vip { background:linear-gradient(90deg,#b45309,#f97316); color:white; font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; display:none; }
  .badge-vip.show { display:inline-block; }
  .nivel-label { font-size:13px; color:var(--laranja); font-weight:700; margin-bottom:6px; }
  .xp-bar-wrap { background:var(--fundo3); border-radius:99px; height:8px; overflow:hidden; width:100%; max-width:300px; margin-bottom:6px; }
  .xp-bar-fill { height:100%; background:linear-gradient(90deg,var(--laranja-escuro),var(--laranja-vivo)); border-radius:99px; transition:width .8s cubic-bezier(.4,0,.2,1); box-shadow:0 0 8px var(--laranja-glow); }
  .xp-texto { font-size:11px; color:var(--texto-muted); font-weight:600; }
  .status-linha { font-size:14px; color:var(--texto-muted); margin-top:6px; display:flex; align-items:center; gap:6px; }
  .vinculos { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .btn-vinculo { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:700; border:1px solid var(--borda); background:var(--fundo3); color:var(--texto-muted); cursor:pointer; display:flex; align-items:center; gap:6px; transition:0.2s; font-family:'Nunito',sans-serif; }
  .btn-vinculo:hover { border-color:var(--laranja); color:var(--laranja); }
  .btn-vinculo.vinculado { border-color:#16a34a; color:#4ade80; }

  .secao { background:var(--fundo2); border-bottom:1px solid var(--borda); padding:22px 30px; }
  .secao-titulo { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:white; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .fav-count { background:var(--fundo3); border:1px solid var(--borda); font-size:11px; font-weight:700; color:var(--texto-muted); padding:3px 10px; border-radius:6px; font-family:'Nunito',sans-serif; }
  .grid-biblioteca { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; }
  .mini-card { background:var(--fundo3); border:1px solid var(--borda); border-radius:10px; padding:14px 10px; text-align:center; font-size:12px; font-weight:700; transition:0.2s; line-height:1.4; }
  .mini-card:hover { border-color:var(--laranja); transform:translateY(-3px); }
  .mini-card .mini-icon { font-size:26px; margin-bottom:6px; }
  .vazio-msg { color:var(--texto-muted); font-size:13px; }

  .edit-box { background:var(--fundo2); padding:25px 30px; }
  .input-group { margin-bottom:16px; }
  label { display:block; font-size:11px; font-weight:800; color:var(--texto-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  input[type=text], textarea { width:100%; padding:12px 14px; background:var(--fundo3); border:1px solid var(--borda); border-radius:10px; color:white; font-family:'Nunito',sans-serif; font-size:14px; outline:none; transition:border-color .2s, box-shadow .2s; resize:vertical; }
  input[type=text]:focus, textarea:focus { border-color:var(--laranja); box-shadow:0 0 0 3px rgba(249,115,22,.1); }
  textarea { min-height:80px; }
  .btn-save { width:100%; padding:14px; background:linear-gradient(90deg,var(--laranja-escuro),var(--laranja)); color:white; border:none; border-radius:10px; font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:0.2s; box-shadow:0 4px 20px var(--laranja-glow); }
  .btn-save:hover { transform:translateY(-2px); box-shadow:0 6px 28px var(--laranja-glow); }
  .btn-save:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .back-link { display:block; text-align:center; margin-top:14px; color:var(--texto-muted); text-decoration:none; font-size:13px; transition:color .2s; }
  .back-link:hover { color:var(--laranja); }

  #toast-xp { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:linear-gradient(135deg,var(--laranja-escuro),var(--laranja)); color:white; padding:14px 28px; border-radius:14px; font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px; box-shadow:0 8px 30px var(--laranja-glow); opacity:0; transition:all .4s cubic-bezier(.34,1.56,.64,1); pointer-events:none; z-index:9999; white-space:nowrap; }
  #toast-xp.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media(max-width:600px){
    .perfil-header,.secao,.edit-box{padding-left:16px;padding-right:16px;}
    #display-name{font-size:20px;}
    .banner-container{height:140px;}
    .avatar-row{margin-top:-40px;}
    #avatar-view{width:80px;height:80px;}
  }
</style>
</head>
<body>
<div class="perfil-card">

  <div class="banner-container">
    <div class="banner-padrao" id="banner-padrao"></div>
    <img id="banner-img" src="" alt="banner">
    <label for="banner-file" class="banner-overlay">📷 Alterar Banner</label>
    <input type="file" id="banner-file" accept="image/*">
  </div>

  <div class="perfil-header">
    <div class="avatar-row">
      <div class="avatar-wrap">
        <label for="avatar-file">
          <img id="avatar-view" src="" alt="avatar">
          <div class="avatar-edit-badge">✏️</div>
        </label>
        <input type="file" id="avatar-file" accept="image/*">
      </div>
      <div class="avatar-info">
        <div class="nome-linha">
          <span id="display-name">Carregando...</span>
          <span class="badge-vip" id="badge-vip">⚡ VIP</span>
        </div>
        <div class="nivel-label" id="nivel-label">Nível 1</div>
        <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xp-bar" style="width:0%"></div></div>
        <div class="xp-texto" id="xp-texto">0 / 100 XP</div>
        <div class="status-linha">🎮 <span id="status-display">Explorando novos mundos</span></div>
        <div class="vinculos">
          <button class="btn-vinculo">💬 Vincular Discord</button>
          <button class="btn-vinculo vinculado">🟢 Google vinculado</button>
        </div>
      </div>
    </div>
  </div>

  <div class="secao">
    <div class="secao-titulo">Biblioteca <span class="fav-count" id="count-total">FAVORITOS (0)</span></div>
    <div id="lista-favoritos" class="grid-biblioteca"></div>
  </div>

  <div class="edit-box">
    <div class="input-group">
      <label for="nick-in">Nickname</label>
      <input type="text" id="nick-in" maxlength="30" placeholder="Seu apelido">
    </div>
    <div class="input-group">
      <label for="bio-in">Status / Bio</label>
      <textarea id="bio-in" maxlength="80" placeholder="Fale algo sobre você..."></textarea>
    </div>
    <button class="btn-save" id="save-btn">SALVAR ALTERAÇÕES</button>
    <a href="index.html" class="back-link">← Voltar para o Hub</a>
  </div>

</div>
<div id="toast-xp">⚡ +10 XP</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const CAMPOS_NAO_JOGO = new Set(['isVip','nickname','bio','avatar','banner','email','photoURL','xp']);
  const infoJogos = {
    "alien-space":   { nome: "Alien Space Wars",  icon: "🚀" },
    "fnaf-watch":    { nome: "FNAF Night Watch",   icon: "👁️" },
    "fazenda-velho": { nome: "Fazenda Velho Moço", icon: "🚜" }
  };

  function calcularNivel(xp) {
    let nivel = 1, acumulado = 0;
    while (true) {
      const necessario = nivel * 100;
      if (xp < acumulado + necessario) return { nivel, xpAtual: xp - acumulado, xpNecessario: necessario, pct: Math.round(((xp - acumulado) / necessario) * 100) };
      acumulado += necessario; nivel++;
    }
  }

  function atualizarXPUI(xp) {
    const { nivel, xpAtual, xpNecessario, pct } = calcularNivel(xp || 0);
    document.getElementById('nivel-label').textContent = `Nível ${nivel}`;
    document.getElementById('xp-bar').style.width = pct + '%';
    document.getElementById('xp-texto').textContent = `${xpAtual} / ${xpNecessario} XP`;
  }

  function mostrarToastXP(qtd) {
    const t = document.getElementById('toast-xp');
    t.textContent = `⚡ +${qtd} XP`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function renderizarFavoritos(dados) {
    const container = document.getElementById('lista-favoritos');
    const countSpan = document.getElementById('count-total');
    container.innerHTML = ""; let total = 0;
    Object.keys(dados).forEach(key => {
      if (CAMPOS_NAO_JOGO.has(key)) return;
      if (dados[key] === true && infoJogos[key]) {
        total++;
        const card = document.createElement('div');
        card.className = "mini-card";
        card.innerHTML = `<div class="mini-icon">${infoJogos[key].icon}</div>${infoJogos[key].nome}`;
        container.appendChild(card);
      }
    });
    countSpan.textContent = `FAVORITOS (${total})`;
    if (total === 0) container.innerHTML = "<p class='vazio-msg'>Nenhum jogo favoritado ainda.</p>";
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    const snap = await getDoc(doc(db, "usuarios", user.uid));
    if (snap.exists()) {
      const d = snap.data();
      document.getElementById('display-name').textContent = d.nickname || user.displayName;
      document.getElementById('status-display').textContent = d.bio || "Explorando novos mundos";
      document.getElementById('nick-in').value = d.nickname || "";
      document.getElementById('bio-in').value  = d.bio || "";
      atualizarXPUI(d.xp || 0);
      if (d.isVip) document.getElementById('badge-vip').classList.add('show');
      document.getElementById('avatar-view').src = d.avatar || user.photoURL || "";
      if (d.banner) {
        const bi = document.getElementById('banner-img');
        bi.src = d.banner; bi.style.display = 'block';
        document.getElementById('banner-padrao').style.display = 'none';
      }
      renderizarFavoritos(d);
    } else {
      document.getElementById('display-name').textContent = user.displayName || "Jogador";
      document.getElementById('avatar-view').src = user.photoURL || "";
      atualizarXPUI(0); renderizarFavoritos({});
    }
  });

  function redimensionar(file, maxW, maxH, q = 0.85) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', q));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  let base64Avatar = null, base64Banner = null;

  document.getElementById('avatar-file').addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    base64Avatar = await redimensionar(file, 200, 200);
    document.getElementById('avatar-view').src = base64Avatar;
  });

  document.getElementById('banner-file').addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    base64Banner = await redimensionar(file, 1200, 400, 0.8);
    const bi = document.getElementById('banner-img');
    bi.src = base64Banner; bi.style.display = 'block';
    document.getElementById('banner-padrao').style.display = 'none';
  });

  document.getElementById('save-btn').addEventListener('click', async () => {
    const user = auth.currentUser;
    if (!user) { alert("Sessão expirada. Faz login novamente."); return; }
    const btn = document.getElementById('save-btn');
    btn.textContent = "SALVANDO..."; btn.disabled = true;
    try {
      const payload = {
        nickname: document.getElementById('nick-in').value.trim(),
        bio:      document.getElementById('bio-in').value.trim()
      };
      if (base64Avatar) payload.avatar = base64Avatar;
      if (base64Banner) payload.banner = base64Banner;
      await setDoc(doc(db, "usuarios", user.uid), payload, { merge: true });
      btn.textContent = "SALVO ✔";
      mostrarToastXP(10);
      setTimeout(() => { location.reload(); }, 1200);
    } catch (err) {
      console.error(err); btn.textContent = "ERRO ❌"; btn.disabled = false;
    }
  });
</script>
</body>
</html>

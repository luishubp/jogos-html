<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 Ajustar Perfil - Hub Jogos</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', sans-serif;}
  body{ background:#020617; color:#e5e7eb; display:flex; justify-content:center; padding:20px; min-height:100vh;}

  .card {
    background:#0b1220; border:1px solid #1e293b; border-radius:15px;
    width:100%; max-width:450px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5);
  }

  .header { position:relative; height:140px; background:#1e293b; }
  #banner-view { width:100%; height:100%; object-fit:cover; opacity:0.6; }
  
  .avatar-box {
    position:absolute; bottom:-35px; left:20px;
    width:90px; height:90px; border-radius:50%;
    border:4px solid #0b1220; background:#020617; overflow:hidden;
    cursor:pointer; transition:0.2s;
  }
  .avatar-box:hover { border-color:#22d3ee; }
  #avatar-view { width:100%; height:100%; object-fit:cover; }

  .main { padding:50px 25px 25px; }
  
  .user-info-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:15px; }
  #display-name { 
    font-size:1.4rem; color:#22d3ee; font-weight:bold;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
  }

  /* --- SESSÃO DE XP E NÍVEL --- */
  .xp-section { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
  .xp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .xp-header h3 { font-size: 1rem; color: #fff; }
  .lvl-badge { background: linear-gradient(90deg, #14b8a6, #22d3ee); color: #020617; font-weight: bold; padding: 3px 10px; border-radius: 20px; font-size: 0.85rem;}
  .xp-bar-bg { width: 100%; height: 10px; background: #1e293b; border-radius: 5px; overflow: hidden; }
  .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #14b8a6, #22d3ee); width: 0%; transition: width 0.8s ease-out; }
  .xp-details { text-align: right; font-size: 0.8rem; color: #9ca3af; margin-top: 5px; }

  .input-group { margin-top:15px; }
  label { display:block; font-size:0.8rem; color:#94a3b8; margin-bottom:5px; font-weight:600; }
  input, textarea {
    width:100%; padding:12px; background:#0f172a; border:1px solid #334155;
    border-radius:8px; color:white; outline:none;
  }
  
  .btn-galeria {
    display:block; width:100%; padding:10px; background:#1e293b;
    border:1px dashed #334155; border-radius:8px; text-align:center;
    cursor:pointer; font-size:0.9rem; transition:0.2s;
  }
  .btn-galeria:hover { background:#26334d; border-color:#22d3ee; }
  input[type="file"] { display:none; }

  .btn-save {
    width:100%; padding:14px; margin-top:25px; border:none;
    background:linear-gradient(90deg,#14b8a6,#22d3ee); color:#020617;
    border-radius:10px; font-weight:bold; cursor:pointer;
  }
  .back { display:block; text-align:center; margin-top:15px; color:#64748b; text-decoration:none; font-size:0.9rem;}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <img id="banner-view" src="" alt="">
    <label for="file-input" class="avatar-box">
      <img id="avatar-view" src="https://via.placeholder.com/150" alt="Avatar">
    </label>
  </div>

  <div class="main">
    <div class="user-info-row">
      <h2 id="display-name">Carregando...</h2>
    </div>

    <div class="xp-section">
      <div class="xp-header">
        <h3>Experiência</h3>
        <span class="lvl-badge" id="lvl-display">Lvl 1</span>
      </div>
      <div class="xp-bar-bg">
        <div class="xp-bar-fill" id="xp-fill"></div>
      </div>
      <div class="xp-details"><span id="xp-current">0</span> / 100 XP</div>
    </div>

    <div class="input-group">
      <label>Foto de Perfil</label>
      <label for="file-input" class="btn-galeria">📁 Abrir Galeria</label>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="input-group">
      <label>Nickname</label>
      <input type="text" id="nick-in">
    </div>

    <div class="input-group">
      <label>Bio</label>
      <textarea id="bio-in" maxlength="80"></textarea>
    </div>

    <button class="btn-save" id="save-btn">Salvar Alterações</button>
    <a href="index.html" class="back">← Voltar para o Hub</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let base64Image = null;

  function calcularNivel(xp) {
    const nivel = Math.floor(xp / 100) + 1;
    const xpAtualNivel = xp % 100;
    const porcentagem = (xpAtualNivel / 100) * 100;
    return { nivel, xpAtualNivel, porcentagem };
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href="index.html"; return; }
    
    const snap = await getDoc(doc(db, "usuarios", user.uid));
    let userXp = 0;

    if (snap.exists()) {
      const d = snap.data();
      document.getElementById('display-name').textContent = d.nickname || user.displayName.split(' ')[0];
      document.getElementById('nick-in').value = d.nickname || "";
      document.getElementById('bio-in').value = d.bio || "";
      if(d.avatar) {
        document.getElementById('avatar-view').src = d.avatar;
      } else {
        document.getElementById('avatar-view').src = user.photoURL;
      }
      if(d.xp) userXp = d.xp;
    } else {
      document.getElementById('display-name').textContent = user.displayName.split(' ')[0];
      document.getElementById('avatar-view').src = user.photoURL;
    }

    // Atualiza a barra de XP na tela
    const stats = calcularNivel(userXp);
    document.getElementById('lvl-display').textContent = `Lvl ${stats.nivel}`;
    document.getElementById('xp-current').textContent = stats.xpAtualNivel;
    setTimeout(() => {
      document.getElementById('xp-fill').style.width = `${stats.porcentagem}%`;
    }, 200);
  });

  // LER FOTO E REDIMENSIONAR (CANVAS) PARA ECONOMIZAR ESPAÇO NO FIREBASE
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        // Cria um canvas para diminuir a imagem (max 200x200px)
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 200;
        const MAX_HEIGHT = 200;
        let width = img.width;
        let height = img.height;

        if (width > height) {
          if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
        } else {
          if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // Salva a versão otimizada em Base64
        base64Image = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('avatar-view').src = base64Image;
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  // SALVAR TUDO NO FIRESTORE
  document.getElementById('save-btn').addEventListener('click', async () => {
    const user = auth.currentUser;
    const btn = document.getElementById('save-btn');
    btn.textContent = "🚀 Salvando...";
    btn.disabled = true;

    try {
      const payload = {
        nickname: document.getElementById('nick-in').value,
        bio: document.getElementById('bio-in').value
      };

      if(base64Image) {
        payload.avatar = base64Image;
      }

      await setDoc(doc(db, "usuarios", user.uid), payload, { merge: true });

      btn.textContent = "Sucesso! ✔️";
      setTimeout(() => { window.location.href = "index.html"; }, 1000);
    } catch (err) {
      console.error(err);
      alert("Erro ao salvar! Verifique se você está logado.");
      btn.textContent = "Tentar Novamente";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>

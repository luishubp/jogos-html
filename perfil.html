<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 Editar Perfil - Hub Jogos</title>
<style>
/* --- SETUP DE DESIGN --- */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',sans-serif;
  background:#020617; color:#e5e7eb;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}

.profile-card {
  background: #0b1220; border: 1px solid #1e293b;
  width: 100%; max-width: 500px; border-radius: 20px;
  overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* --- BANNER E AVATAR --- */
.header-section { position: relative; height: 160px; background: #1e293b; }
#banner-preview { width: 100%; height: 100%; object-fit: cover; }

.avatar-container {
  position: absolute; bottom: -40px; left: 30px;
  width: 100px; height: 100px; border-radius: 50%;
  border: 5px solid #0b1220; background: #020617;
  overflow: hidden; cursor: pointer; transition: 0.3s;
}
.avatar-container:hover { border-color: #22d3ee; transform: scale(1.05); }
#avatar-preview { width: 100%; height: 100%; object-fit: cover; }

/* --- FORMULÁRIO --- */
.content { padding: 60px 30px 30px; }
.name-row { 
  display: flex; align-items: center; justify-content: space-between; 
  gap: 10px; margin-bottom: 5px; 
}
/* AQUI RESOLVE O NOME EMPURRANDO TUDO */
#display-name { 
  color: #22d3ee; font-size: 1.5rem; font-weight: bold;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
  max-width: 80%;
}

.input-group { margin-top: 20px; }
label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; font-weight: bold; }
input, textarea {
  width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155;
  border-radius: 10px; color: white; outline: none; transition: 0.2s;
}
input:focus { border-color: #22d3ee; }

/* ESCONDE O INPUT DE ARQUIVO REAL E CRIA UM BOTÃO BONITO */
.file-btn {
  display: inline-block; padding: 8px 15px; background: #1e293b;
  border-radius: 8px; cursor: pointer; font-size: 0.8rem; margin-top: 5px;
}
.file-btn:hover { background: #334155; }
input[type="file"] { display: none; }

.btn-save {
  width: 100%; padding: 15px; margin-top: 30px; border: none;
  background: linear-gradient(90deg,#14b8a6,#22d3ee); color: #020617;
  border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem;
}
.back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; }
</style>
</head>
<body>

<div class="profile-card">
  <div class="header-section">
    <img id="banner-preview" src="https://via.placeholder.com/800x200/1e293b/1e293b" alt="Banner">
    
    <label for="input-avatar" class="avatar-container">
      <img id="avatar-preview" src="https://via.placeholder.com/150" alt="Avatar">
    </label>
  </div>

  <div class="content">
    <div class="name-row">
      <h2 id="display-name">Carregando...</h2>
    </div>
    <p id="display-bio" style="color:#94a3b8; font-size:0.9rem;">Sua bio aparecerá aqui</p>

    <div class="input-group">
      <label>Alterar Foto de Perfil (Galeria)</label>
      <label for="input-avatar" class="file-btn">📸 Escolher da Galeria</label>
      <input type="file" id="input-avatar" accept="image/*">
    </div>

    <div class="input-group">
      <label>Nickname</label>
      <input type="text" id="nickname-field">
    </div>

    <div class="input-group">
      <label>Sua Bio</label>
      <textarea id="bio-field" maxlength="100"></textarea>
    </div>

    <button class="btn-save" id="btn-save">Salvar Alterações</button>
    <a href="index.html" class="back-link">← Voltar ao Hub</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let tempAvatarFile = null;

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const snap = await getDoc(doc(db, "usuarios", user.uid));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById('display-name').textContent = d.nickname || user.displayName;
        document.getElementById('display-bio').textContent = d.bio || "";
        document.getElementById('nickname-field').value = d.nickname || "";
        document.getElementById('bio-field').value = d.bio || "";
        if(d.avatar) document.getElementById('avatar-preview').src = d.avatar;
      }
    }
  });

  // Preview da imagem ao escolher na galeria
  document.getElementById('input-avatar').addEventListener('change', e => {
    const file = e.target.files[0];
    if(file) {
      tempAvatarFile = file;
      document.getElementById('avatar-preview').src = URL.createObjectURL(file);
    }
  });

  document.getElementById('btn-save').addEventListener('click', async () => {
    const user = auth.currentUser;
    if(!user) return;
    
    const btn = document.getElementById('btn-save');
    btn.textContent = "Salvando...";
    
    let finalAvatarUrl = document.getElementById('avatar-preview').src;

    // Se escolheu uma foto nova, sobe pro Storage
    if(tempAvatarFile) {
      const sRef = ref(storage, `perfis/${user.uid}/avatar.png`);
      await uploadBytes(sRef, tempAvatarFile);
      finalAvatarUrl = await getDownloadURL(sRef);
    }

    await setDoc(doc(db, "usuarios", user.uid), {
      nickname: document.getElementById('nickname-field').value,
      bio: document.getElementById('bio-field').value,
      avatar: finalAvatarUrl
    }, { merge: true });

    btn.textContent = "Perfil Atualizado! ✔️";
    setTimeout(() => { location.reload(); }, 1500);
  });
</script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 Perfil - Hub Jogos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --laranja: #f97316;
    --laranja-vivo: #fb923c;
    --laranja-escuro: #ea580c;
    --laranja-glow: rgba(249,115,22,0.35);
    --fundo: #0a0a0a;
    --fundo2: #111111;
    --fundo3: #1a1a1a;
    --borda: #2a2a2a;
    --texto: #f1f0ef;
    --texto-muted: #6b6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--fundo);
    color: var(--texto);
    min-height: 100vh;
  }

  /* ── BANNER ─────────────────────────────────────────────────── */
  .banner-wrap {
    position: relative; width: 100%; height: 200px;
    background: linear-gradient(135deg, #1a0a00, #2d1200, #1a0a00);
    overflow: hidden; cursor: pointer;
  }
  .banner-wrap::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(234,88,12,0.15) 0%, transparent 50%);
  }
  #banner-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s; }
  #banner-img.loaded { opacity: 1; }
  .banner-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .banner-wrap:hover .banner-overlay { opacity: 1; }
  .banner-overlay span {
    background: rgba(0,0,0,0.7); border: 1px solid var(--laranja);
    color: var(--laranja); padding: 8px 20px; border-radius: 6px;
    font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── CARD PRINCIPAL ─────────────────────────────────────────── */
  .perfil-card { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }

  .perfil-topo { position: relative; padding: 0 10px; margin-bottom: 30px; }

  .avatar-wrap { position: absolute; top: -50px; left: 10px; }
  .avatar-ring {
    width: 96px; height: 96px; border-radius: 50%; padding: 3px;
    background: linear-gradient(135deg, var(--laranja), var(--laranja-escuro));
    box-shadow: 0 0 20px var(--laranja-glow); cursor: pointer; transition: box-shadow 0.3s;
  }
  .avatar-ring:hover { box-shadow: 0 0 35px var(--laranja-glow); }
  #avatar-view {
    width: 100%; height: 100%; border-radius: 50%;
    object-fit: cover; background: var(--fundo3); display: block;
  }
  .avatar-cam {
    position: absolute; bottom: 2px; right: 2px;
    width: 26px; height: 26px; background: var(--laranja); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; border: 2px solid var(--fundo); pointer-events: none;
  }

  .info-bloco { padding-top: 60px; display: flex; flex-direction: column; gap: 10px; }

  .nome-linha { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* FIX 1: nome longo não quebra o layout */
  #display-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px; font-weight: 900; letter-spacing: -0.5px; line-height: 1;
    color: var(--texto);
    /* Trunca se for muito longo */
    max-width: 400px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .vip-badge {
    display: none;
    background: linear-gradient(90deg, #b45309, #f59e0b);
    color: #000; font-size: 11px; font-weight: 800;
    padding: 3px 10px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase;
  }
  .vip-badge.show { display: inline-block; }

  .status-linha { color: var(--texto-muted); font-size: 14px; display: flex; align-items: center; gap: 8px; }

  /* ── BARRA DE XP ─────────────────────────────────────────────── */
  .xp-bloco {
    background: var(--fundo2); border: 1px solid var(--borda);
    border-radius: 10px; padding: 14px 18px; margin-top: 6px;
  }
  .xp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .xp-header span { font-size: 13px; font-weight: 700; }
  .xp-header .xp-total { color: var(--laranja); }
  .xp-bar-bg { height: 8px; background: var(--fundo3); border-radius: 99px; overflow: hidden; }
  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--laranja-escuro), var(--laranja-vivo));
    border-radius: 99px;
    /* FIX 4: transição suave na barra */
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px var(--laranja-glow);
    width: 0%;
  }
  .xp-sub { margin-top: 6px; font-size: 11px; color: var(--texto-muted); }

  .nivel-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--fundo3); border: 1px solid var(--borda);
    border-radius: 4px; padding: 3px 10px;
    font-size: 12px; font-weight: 700; color: var(--laranja);
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* ── VÍNCULOS ────────────────────────────────────────────────── */
  .vinculos { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .btn-vinculo {
    display: flex; align-items: center; gap: 7px;
    background: var(--fundo3); border: 1px solid var(--borda);
    border-radius: 6px; padding: 7px 14px; color: var(--texto-muted);
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: border-color 0.2s, color 0.2s; font-family: 'Barlow', sans-serif;
  }
  .btn-vinculo:hover { border-color: var(--laranja); color: var(--texto); }
  .btn-google { border-color: #2d6a3f; color: #4ade80; }
  .btn-google:hover { border-color: #4ade80; }

  .divisor { height: 1px; background: var(--borda); margin: 28px 0; }

  /* ── BIBLIOTECA ──────────────────────────────────────────────── */
  .sec-titulo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .sec-titulo h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
  }
  .fav-count {
    background: var(--fundo3); border: 1px solid var(--borda);
    border-radius: 4px; padding: 4px 12px;
    font-size: 11px; font-weight: 700; color: var(--laranja);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .grid-biblioteca { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .mini-card {
    background: var(--fundo2); border: 1px solid var(--borda);
    border-radius: 10px; padding: 18px 12px; text-align: center;
    font-size: 13px; font-weight: 700; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .mini-card:hover { border-color: var(--laranja); transform: translateY(-4px); box-shadow: 0 8px 20px rgba(249,115,22,0.15); }
  .mini-card .mc-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .vazio-msg { color: var(--texto-muted); font-size: 13px; padding: 20px 0; }

  /* ── EDIT BOX ────────────────────────────────────────────────── */
  .edit-box { background: var(--fundo2); border: 1px solid var(--borda); border-radius: 12px; padding: 24px; }
  .edit-box h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 20px; color: var(--laranja);
  }
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--texto-muted); margin-bottom: 7px;
  }
  .input-group input,
  .input-group textarea {
    width: 100%; padding: 12px 14px; background: var(--fundo3);
    border: 1px solid var(--borda); border-radius: 8px;
    color: var(--texto); font-family: 'Barlow', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-group textarea { min-height: 80px; resize: vertical; }
  .input-group input:focus,
  .input-group textarea:focus { border-color: var(--laranja); box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }

  .btn-salvar {
    width: 100%; padding: 14px;
    background: linear-gradient(90deg, var(--laranja-escuro), var(--laranja-vivo));
    color: #000; border: none; border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(249,115,22,0.3);
  }
  .btn-salvar:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(249,115,22,0.45); }
  .btn-salvar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .back-link {
    display: block; text-align: center; margin-top: 16px;
    color: var(--texto-muted); text-decoration: none;
    font-size: 13px; font-weight: 600; transition: color 0.2s;
  }
  .back-link:hover { color: var(--laranja); }

  /* ── TOAST ───────────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--fundo3); border: 1px solid var(--laranja);
    color: var(--texto); padding: 12px 24px; border-radius: 8px;
    font-size: 14px; font-weight: 700; z-index: 9999; opacity: 0;
    transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media(max-width: 520px) {
    #display-name { font-size: 24px; max-width: 220px; }
    .banner-wrap { height: 150px; }
    .avatar-wrap { top: -40px; }
    .avatar-ring { width: 80px; height: 80px; }
    .info-bloco { padding-top: 50px; }
  }
</style>
</head>
<body>

<div class="banner-wrap" id="banner-wrap">
  <img id="banner-img" src="" alt="Banner">
  <div class="banner-overlay"><span>📷 Alterar Banner</span></div>
  <input type="file" id="banner-input" accept="image/*" style="display:none;">
</div>

<div class="perfil-card">
  <div class="perfil-topo">
    <div class="avatar-wrap">
      <label for="avatar-input">
        <div class="avatar-ring">
          <img id="avatar-view" src="" alt="Avatar">
        </div>
        <div class="avatar-cam">📷</div>
      </label>
      <input type="file" id="avatar-input" accept="image/*" style="display:none;">
    </div>

    <div class="info-bloco">
      <div class="nome-linha">
        <h2 id="display-name">Carregando...</h2>
        <span class="vip-badge" id="vip-badge">💎 VIP</span>
      </div>
      <div class="status-linha">🎮 <span id="status-display">Explorando novos mundos</span></div>

      <div class="xp-bloco">
        <div class="xp-header">
          <span><span id="nivel-label" class="nivel-badge">⚡ Nível 1</span></span>
          <span class="xp-total" id="xp-total-label">0 XP</span>
        </div>
        <div class="xp-bar-bg">
          <div class="xp-bar-fill" id="xp-bar"></div>
        </div>
        <div class="xp-sub" id="xp-sub">0 / 100 XP para o próximo nível</div>
      </div>

      <div class="vinculos">
        <button class="btn-vinculo">💬 Vincular Discord</button>
        <button class="btn-vinculo btn-google">🟢 Google vinculado</button>
      </div>
    </div>
  </div>

  <div class="divisor"></div>

  <div class="sec-titulo">
    <h3>Biblioteca</h3>
    <span class="fav-count" id="count-total">FAVORITOS (0)</span>
  </div>
  <div id="lista-favoritos" class="grid-biblioteca"></div>

  <div class="divisor"></div>

  <div class="edit-box">
    <h3>✏️ Editar Perfil</h3>
    <div class="input-group">
      <label for="nick-in">Nickname</label>
      <input type="text" id="nick-in" maxlength="30" placeholder="Seu apelido">
    </div>
    <div class="input-group">
      <label for="bio-in">Status / Bio</label>
      <textarea id="bio-in" maxlength="80" placeholder="Fala algo sobre você..."></textarea>
    </div>
    <button class="btn-salvar" id="save-btn">Salvar Alterações</button>
    <a href="index.html" class="back-link">← Voltar para o Hub</a>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // FIX 3: campos que NÃO são favoritos de jogos
  const CAMPOS_META = new Set(['isVip','nickname','bio','avatar','banner','email','photoURL','xp','nivel']);

  const infoJogos = {
    "alien-space":   { nome: "Alien Space Wars",  icon: "🚀" },
    "fnaf-watch":    { nome: "FNAF Night Watch",   icon: "👁️" },
    "fazenda-velho": { nome: "Fazenda Velho Moço", icon: "🚜" }
  };

  // FIX 4: cálculo e animação de XP corrigidos
  function calcNivel(xp) {
    const nivel  = Math.floor(xp / 100) + 1;
    const xpAtual = xp % 100;
    return { nivel, xpAtual };
  }

  function atualizarXPUI(xp) {
    const { nivel, xpAtual } = calcNivel(xp);
    document.getElementById('nivel-label').textContent   = `⚡ Nível ${nivel}`;
    document.getElementById('xp-total-label').textContent = `${xp} XP`;
    document.getElementById('xp-sub').textContent         = `${xpAtual} / 100 XP para o próximo nível`;
    // Pequeno delay para o CSS transition funcionar ao carregar a página
    setTimeout(() => {
      document.getElementById('xp-bar').style.width = xpAtual + '%';
    }, 400);
  }

  function showToast(msg, ms = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  function renderizarFavoritos(dados) {
    const container = document.getElementById('lista-favoritos');
    const countSpan = document.getElementById('count-total');
    container.innerHTML = "";
    let total = 0;
    Object.keys(dados).forEach(key => {
      if (CAMPOS_META.has(key)) return;
      if (dados[key] === true && infoJogos[key]) {
        total++;
        const card = document.createElement('div');
        card.className = "mini-card";
        card.innerHTML = `<span class="mc-icon">${infoJogos[key].icon}</span>${infoJogos[key].nome}`;
        container.appendChild(card);
      }
    });
    countSpan.textContent = `FAVORITOS (${total})`;
    if (total === 0) container.innerHTML = "<p class='vazio-msg'>Nenhum jogo favoritado ainda.</p>";
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }

    const snap = await getDoc(doc(db, "usuarios", user.uid));

    if (snap.exists()) {
      const d = snap.data();
      document.getElementById('display-name').textContent  = d.nickname || user.displayName || 'Jogador';
      document.getElementById('status-display').textContent = d.bio || "Explorando novos mundos";
      document.getElementById('nick-in').value  = d.nickname || "";
      document.getElementById('bio-in').value   = d.bio || "";

      // FIX 2: avatar do Firestore tem prioridade sobre o Google
      document.getElementById('avatar-view').src = d.avatar || user.photoURL || "";

      if (d.banner) {
        const bImg = document.getElementById('banner-img');
        bImg.src = d.banner;
        bImg.onload = () => bImg.classList.add('loaded');
      }
      if (d.isVip) document.getElementById('vip-badge').classList.add('show');

      // FIX 4: passa o XP real para a UI
      atualizarXPUI(d.xp || 0);
      renderizarFavoritos(d);
    } else {
      document.getElementById('display-name').textContent = user.displayName || "Jogador";
      document.getElementById('avatar-view').src = user.photoURL || "";
      atualizarXPUI(0);
      renderizarFavoritos({});
    }
  });

  function resizarImagem(file, maxW, maxH, qualidade = 0.8) {
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          res(c.toDataURL('image/jpeg', qualidade));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  let base64Avatar = null;
  document.getElementById('avatar-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    base64Avatar = await resizarImagem(file, 200, 200);
    document.getElementById('avatar-view').src = base64Avatar;
    showToast('📷 Avatar pronto! Clique em Salvar.');
  });

  let base64Banner = null;
  document.getElementById('banner-wrap').addEventListener('click', () => {
    document.getElementById('banner-input').click();
  });
  document.getElementById('banner-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    base64Banner = await resizarImagem(file, 1200, 300, 0.75);
    const bImg = document.getElementById('banner-img');
    bImg.src = base64Banner;
    bImg.classList.add('loaded');
    showToast('🖼️ Banner pronto! Clique em Salvar.');
  });

  // FIX 3: salvar perfil NÃO dá XP — XP só será dado por ações específicas (jogar, comentar)
  document.getElementById('save-btn').addEventListener('click', async () => {
    const user = auth.currentUser;
    if (!user) { showToast('❌ Sessão expirada. Faça login novamente.'); return; }

    const btn = document.getElementById('save-btn');
    btn.textContent = "🚀 Salvando...";
    btn.disabled = true;

    try {
      const payload = {
        nickname: document.getElementById('nick-in').value.trim(),
        bio:      document.getElementById('bio-in').value.trim()
      };
      if (base64Avatar) payload.avatar = base64Avatar;
      if (base64Banner) payload.banner = base64Banner;

      // merge:true para não sobrescrever XP, isVip, favoritos etc.
      await setDoc(doc(db, "usuarios", user.uid), payload, { merge: true });

      btn.textContent = "✔️ Salvo!";
      showToast('✅ Perfil atualizado!');
      setTimeout(() => { location.reload(); }, 1200);
    } catch (err) {
      console.error(err);
      btn.textContent = "❌ Erro ao salvar";
      btn.disabled = false;
      showToast('❌ Erro ao salvar. Tente novamente.');
    }
  });
</script>
</body>
</html>

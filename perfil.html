<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 Perfil - Hub Jogos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box; margin:0; padding:0; font-family: 'Inter', sans-serif;}
  body{ background:#020617; color:#e5e7eb; display:flex; justify-content:center; padding:20px; min-height:100vh;}

  .card-perfil {
    background:#0b1220; border:1px solid #1e293b; border-radius:15px;
    width:100%; max-width:600px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5);
    padding: 30px;
  }

  .perfil-header { display: flex; align-items: flex-start; gap: 25px; margin-bottom: 30px; }

  .foto-container { position: relative; }
  #avatar-view { 
    width: 120px; height: 120px; border-radius: 50%; 
    object-fit: cover; border: 4px solid #14b8a6;
    cursor: pointer; transition: 0.3s;
  }

  .info-container { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 0; }

  .linha-nome { display: flex; align-items: center; gap: 10px; }
  #display-name { 
    font-size: 28px; font-weight: 700; color: white;
    max-width: 250px; white-space: nowrap; 
    overflow: hidden; text-overflow: ellipsis;
  }

  .status-text { color: #94a3b8; font-size: 16px; }

  .botoes-vinculo { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .btn-vinculo {
    background: #1a1a1a; border: 1px solid #334155; border-radius: 6px;
    padding: 6px 12px; color: #94a3b8; font-size: 12px; font-weight: 600;
  }
  .btn-google-vinculado { border-color: #059669; color: #34d399; }

  /* --- SEÇÃO BIBLIOTECA --- */
  .biblioteca-header {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #1e293b; padding-top: 20px; margin-top: 10px;
  }
  .biblioteca-header h3 { font-size: 18px; font-weight: 700; }
  .fav-count { background: #1e293b; padding: 4px 12px; border-radius: 4px; font-size: 12px; color: #94a3b8; }

  .grid-biblioteca {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px; margin-top: 20px;
  }
  .mini-card-jogo {
    background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
    padding: 15px; text-align: center; font-size: 13px; font-weight: 600;
    transition: 0.2s;
  }
  .mini-card-jogo:hover { border-color: #22d3ee; transform: translateY(-3px); }

  /* EDIT BOX */
  .edit-box { background: #0f172a; padding: 20px; border-radius: 10px; margin-top: 30px; border: 1px solid #1e293b; }
  .input-group { margin-bottom: 15px; }
  label { display:block; font-size:0.75rem; color:#94a3b8; margin-bottom:5px; text-transform: uppercase; }
  input, textarea {
    width:100%; padding:12px; background:#020617; border:1px solid #334155;
    border-radius:8px; color:white; outline:none;
  }
  
  .btn-save {
    width:100%; padding:14px; background:linear-gradient(90deg,#14b8a6,#22d3ee); 
    color:#020617; border:none; border-radius:10px; font-weight:bold; cursor:pointer;
  }
  .back-link { display:block; text-align:center; margin-top:15px; color:#64748b; text-decoration:none; }
</style>
</head>
<body>

<div class="card-perfil">
  <div class="perfil-header">
    <div class="foto-container">
      <label for="file-input"><img id="avatar-view" src="https://via.placeholder.com/150"></label>
      <input type="file" id="file-input" accept="image/*" style="display:none;">
    </div>
    <div class="info-container">
      <div class="linha-nome">
        <h2 id="display-name">Carregando...</h2>
      </div>
      <p class="status-text">🎮 <span id="status-display">Explorando novos mundos</span></p>
      <div class="botoes-vinculo">
        <div class="btn-vinculo">🔗 Vincular Discord</div>
        <div class="btn-vinculo btn-google-vinculado">🟢 Google vinculado</div>
      </div>
    </div>
  </div>

  <div class="biblioteca-header">
    <h3>Biblioteca</h3>
    <span class="fav-count" id="count-total">FAVORITOS (0)</span>
  </div>

  <div id="lista-favoritos" class="grid-biblioteca"></div>

  <div class="edit-box">
    <div class="input-group">
      <label>Nickname</label>
      <input type="text" id="nick-in">
    </div>
    <div class="input-group">
      <label>Status / Bio</label>
      <textarea id="bio-in" maxlength="80"></textarea>
    </div>
    <button class="btn-save" id="save-btn">Salvar Alterações</button>
    <a href="index.html" class="back-link">← Voltar para o Hub</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let base64Image = null;

  // DICIONÁRIO PARA TRANSFORMAR ID EM NOME REAL
  const infoJogos = {
    "alien-space": { nome: "Alien Space Wars", icon: "🚀" },
    "fnaf-watch": { nome: "FNAF Night Watch", icon: "👁️" },
    "fazenda-velho": { nome: "Fazenda Velho", icon: "🚜" }
  };

  function renderizarFavoritos(dados) {
    const container = document.getElementById('lista-favoritos');
    const countSpan = document.getElementById('count-total');
    container.innerHTML = "";
    let total = 0;

    Object.keys(dados).forEach(key => {
      if (dados[key] === true && infoJogos[key]) {
        total++;
        const card = document.createElement('div');
        card.className = "mini-card-jogo";
        card.innerHTML = `${infoJogos[key].icon}<br>${infoJogos[key].nome}`;
        container.appendChild(card);
      }
    });
    countSpan.textContent = `FAVORITOS (${total})`;
    if(total === 0) container.innerHTML = "<p style='color:#64748b; font-size:13px;'>Nenhum jogo favoritado ainda.</p>";
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href="index.html"; return; }
    const snap = await getDoc(doc(db, "usuarios", user.uid));
    if (snap.exists()) {
      const d = snap.data();
      document.getElementById('display-name').textContent = d.nickname || user.displayName;
      document.getElementById('status-display').textContent = d.bio || "Explorando novos mundos";
      document.getElementById('nick-in').value = d.nickname || "";
      document.getElementById('bio-in').value = d.bio || "";
      if(d.avatar) document.getElementById('avatar-view').src = d.avatar;
      else document.getElementById('avatar-view').src = user.photoURL;
      
      renderizarFavoritos(d); // CHAMA A BIBLIOTECA
    }
  });

  // (O resto do seu código de redimensionamento e salvamento continua igual...)
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 200;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        base64Image = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('avatar-view').src = base64Image;
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('save-btn').addEventListener('click', async () => {
    const user = auth.currentUser;
    const btn = document.getElementById('save-btn');
    btn.textContent = "🚀 Salvando...";
    btn.disabled = true;
    try {
      const payload = {
        nickname: document.getElementById('nick-in').value,
        bio: document.getElementById('bio-in').value
      };
      if(base64Image) payload.avatar = base64Image;
      await setDoc(doc(db, "usuarios", user.uid), payload, { merge: true });
      btn.textContent = "Sucesso! ✔️";
      setTimeout(() => { location.reload(); }, 1000);
    } catch (err) {
      btn.textContent = "Erro ao salvar";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>

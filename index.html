<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Meu Hub de Jogos</title>
<style>
/* DESIGN NEON - IGUAL AO TEU ORIGINAL */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:radial-gradient(circle at top,#0f1724,#020617);color:#e5e7eb;transition:0.3s;min-height:100vh;}
body.light{background:#f0f0f0;color:#111;}
header{position:fixed;top:0;left:0;width:100%;background:rgba(15,23,36,0.95);display:flex;justify-content:space-between;align-items:center;padding:15px 30px;border-bottom:1px solid #1e293b;z-index:1000;}
body.light header{background:#fff;border-color:#ccc;}
header h1{font-size:1.8rem;background:linear-gradient(90deg,#22d3ee,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.menu-buttons{display:flex;align-items:center;gap:10px;}
button, #btn-login{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-weight:bold;background:linear-gradient(90deg,#14b8a6,#22d3ee);color:#020617;transition:0.2s;display:flex;align-items:center;gap:8px;}
#user-photo{width:22px;height:22px;border-radius:50%;display:none;border:1px solid #000;}
.container{padding:120px 20px 40px;max-width:1200px;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;}
.card{background:linear-gradient(180deg,#0b1220,#020617);border:1px solid #1e293b;border-radius:16px;padding:25px;display:flex;flex-direction:column;transition:0.3s;}
body.light .card{background:#fff;border-color:#ccc;}
.card:hover{transform:translateY(-8px);border-color:#22d3ee;box-shadow:0 0 20px rgba(34,211,238,0.2);}
.title{font-size:1.3rem;margin-bottom:10px;font-weight:bold;}
.fav-btn{background:none;border:none;cursor:pointer;font-size:1.5rem;align-self:flex-start;margin-bottom:10px;}
.btn-jogar{display:block;padding:12px;border-radius:10px;background:linear-gradient(90deg,#14b8a6,#22d3ee);color:#020617;text-decoration:none;font-weight:bold;text-align:center;margin-top:auto;}
</style>
</head>
<body>

<header>
  <h1>🎮 Meu Hub</h1>
  <div class="menu-buttons">
    <button id="btn-login" onclick="fazerLogin()">
      <img id="user-photo" src="">
      <span id="user-name">Login Google</span>
    </button>
    <button onclick="document.body.classList.toggle('light')">🌓</button>
  </div>
</header>

<div class="container">
  <div class="grid" id="game-grid">
    <div class="card" data-id="alien-wars">
      <button class="fav-btn" onclick="toggleFav('alien-wars')">🤍</button>
      <div class="title">🚀 Alien Space Wars</div>
      <p>Shooter espacial clássico.</p>
      <a href="./games/alien-space-wars/" class="btn-jogar">Jogar</a>
    </div>
    <div class="card" data-id="fnaf-watch">
      <button class="fav-btn" onclick="toggleFav('fnaf-watch')">🤍</button>
      <div class="title">👁️ FNAF Night Watch</div>
      <p>Sobreviva monitorando câmeras.</p>
      <a href="./games/fnaf-night-watch/" class="btn-jogar">Jogar</a>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Configuração vinda das tuas fotos
  const firebaseConfig = {
    apiKey: "AIzaSyALp8QDfjyjGQDfaJuVjEEv_mBhnylHUj8",
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // --- FUNÇÕES DE LOGIN ---
  window.fazerLogin = async () => {
    if (!auth.currentUser) {
      try { await signInWithPopup(auth, provider); } catch (e) { alert("Erro no login!"); }
    } else {
      if(confirm("Sair da conta?")) signOut(auth);
    }
  };

  onAuthStateChanged(auth, (user) => {
    const nameSpan = document.getElementById('user-name');
    const photoImg = document.getElementById('user-photo');
    if (user) {
      nameSpan.textContent = user.displayName.split(' ')[0];
      photoImg.src = user.photoURL;
      photoImg.style.display = "block";
      carregarFavoritosNuvem();
    } else {
      nameSpan.textContent = "Login Google";
      photoImg.style.display = "none";
    }
  });

  // --- FUNÇÕES DE FAVORITOS (FIRESTORE) ---
  window.toggleFav = async (gameId) => {
    const isFav = localStorage.getItem('fav-' + gameId) !== 'true';
    localStorage.setItem('fav-' + gameId, isFav);
    
    // Atualiza Visual
    const btn = document.querySelector(`[data-id="${gameId}"] .fav-btn`);
    btn.innerHTML = isFav ? '❤️' : '🤍';

    // Salva no Firebase se logado
    if (auth.currentUser) {
      const userRef = doc(db, "usuarios", auth.currentUser.uid);
      await setDoc(userRef, { [gameId]: isFav }, { merge: true });
    }
  };

  async function carregarFavoritosNuvem() {
    if (auth.currentUser) {
      const docSnap = await getDoc(doc(db, "usuarios", auth.currentUser.uid));
      if (docSnap.exists()) {
        const dados = docSnap.data();
        Object.keys(dados).forEach(gameId => {
          localStorage.setItem('fav-' + gameId, dados[gameId]);
          const btn = document.querySelector(`[data-id="${gameId}"] .fav-btn`);
          if (btn) btn.innerHTML = dados[gameId] ? '❤️' : '🤍';
        });
      }
    }
  }
</script>
</body>
</html>

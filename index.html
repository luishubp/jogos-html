<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Hub de Jogos HTML - Pro Version</title>
<style>
/* --- DESIGN --- */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:radial-gradient(circle at top,#0f1724,#020617);
  color:#e5e7eb;
  transition:0.3s;
  min-height: 100vh;
}
body.light{background:#f0f0f0;color:#111;}

header{
  position:fixed;top:0;left:0;width:100%;
  background:rgba(15,23,36,0.95);
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 30px;
  border-bottom:1px solid #1e293b;
  z-index:1000;
}
body.light header{background:#fff;border-color:#ccc;color:#111;}

header h1{
  font-size:1.8rem;
  background:linear-gradient(90deg,#22d3ee,#14b8a6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.menu-buttons{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.menu-buttons button, #toggle-theme, #btn-login {
  padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-weight:bold;
  background:linear-gradient(90deg,#14b8a6,#22d3ee);color:#020617;transition:0.2s;
  display: flex; align-items: center; gap: 8px;
}

#user-photo { width: 24px; height: 24px; border-radius: 50%; display: none; border: 1.5px solid #020617; object-fit: cover; }

.menu-buttons button.active{box-shadow:0 0 15px rgba(34,211,238,0.6); transform: scale(1.05);}

#search-input{
  padding:8px 12px;border-radius:8px;border:1px solid #1e293b;outline:none;width:180px;
  background: #0f1724; color: white;
}
body.light #search-input { background: white; color: #333; border-color: #ccc; }

.container{padding:120px 20px 40px; max-width: 1200px; margin: 0 auto;}
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:25px; }

.card{
  background:linear-gradient(180deg,#0b1220,#020617);
  border:1px solid #1e293b;
  border-radius:16px;
  padding:25px;
  transition:all 0.3s ease;
  display:flex; flex-direction:column; justify-content:space-between;
  position: relative;
}
body.light .card{background:#fff;border-color:#ccc;color:#111;}
.card:hover{transform:translateY(-8px);border-color:#22d3ee;box-shadow:0 0 20px rgba(34,211,238,0.2);}

.icon{font-size:3rem;margin-bottom:10px;}
.title{font-size:1.3rem;margin-bottom:10px;font-weight:bold;}
.desc{font-size:0.95rem;color:#9ca3af;margin-bottom:20px;flex-grow:1;}

.btn{display:inline-block;padding:12px 20px;border-radius:10px;background:linear-gradient(90deg,#14b8a6,#22d3ee);color:#020617;text-decoration:none;font-weight:bold;border:none;cursor:pointer;text-align:center;}
.btn-disabled{background:#334155;color:#94a3b8;cursor:not-allowed;}

.fav-btn{background:none;border:none;cursor:pointer;font-size:1.5rem;margin-bottom:10px; align-self: flex-start; transition: 0.2s;}
.fav-btn.active{filter: drop-shadow(0 0 5px #f87171); color: #f87171;}

.card.futuro-jogo{opacity:0.6; border:1px dashed #555;}
footer{margin-top:40px;padding: 20px; font-size:0.8rem;color:#6b7280;text-align:center;}

/* DROPDOWN */
.profile-container { position: relative; display: inline-block; }
.dropdown-content {
  display: none; position: absolute; right: 0; top: 115%;
  background: #0b1220; min-width: 240px; border-radius: 12px;
  border: 1px solid #1e293b; z-index: 1000; overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.7);
}
body.light .dropdown-content { background: #fff; border-color: #ccc; }
.dropdown-content.show { display: block; animation: fadeIn 0.2s forwards; }

.dropdown-content a, .logout-btn {
  color: #e5e7eb; padding: 12px 16px; text-decoration: none; display: block;
  font-size: 14px; background: none; border: none; width: 100%; text-align: left; cursor: pointer;
}
body.light .dropdown-content a, body.light .logout-btn { color: #333; }
.dropdown-content a:hover { background: #1e293b; color: #22d3ee; }

.menu-header { padding: 15px; font-weight: bold; border-bottom: 1px solid #1e293b; font-size: 0.95rem; background: #020617;}
.logout-btn { color: #f87171; font-weight: bold; border-top: 1px solid #1e293b; }

/* VIP STYLE */
.vip-name { 
    background: linear-gradient(90deg, #ffca28, #f4ff81);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 8px rgba(255, 202, 40, 0.3);
}

.menu-bastidores { padding: 15px; background: #02061711; border-top: 1px solid #1e293b; }
.menu-bastidores h4 { color: #22d3ee; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; }
.menu-bastidores li { font-size: 0.8rem; color: #9ca3af; list-style: none; margin-bottom: 4px; }

@keyframes fadeIn { from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<header>
  <h1>🎮 Hub Jogos</h1>
  <div class="menu-buttons">
    <input type="text" id="search-input" placeholder="🔎 Buscar jogos...">
    <button class="category-btn active" data-category="all">Todos</button>
    <button class="category-btn" data-category="acao">Ação</button>
    <button class="category-btn" data-category="terror">Terror</button>
    
    <div class="profile-container">
      <button id="btn-login">
        <img id="user-photo" src="">
        <span id="user-name">Entrar</span>
      </button>
      
      <div id="drop-menu" class="dropdown-content">
        <div class="menu-header"><p id="menu-user-hello">Olá!</p></div>
        <a href="perfil.html">👤 Editar Perfil</a>
        <a href="#">🏅 Seja VIP</a>
        <div class="menu-bastidores">
          <h4>Acessos MidNight 🌑</h4>
          <ul>
            <li>🛠️ Devlog</li>
            <li>🚀 Acesso Antecipado</li>
          </ul>
        </div>
        <button id="btn-logout" class="logout-btn">🚪 Sair da Conta</button>
      </div>
    </div>
    <button id="toggle-theme">🌙 Dark</button>
  </div>
</header>

<div class="container">
  <div class="grid" id="game-grid">
    <div class="card" data-category="acao" data-id="alien-space">
      <div class="icon">🚀</div>
      <div class="title">Alien Space Wars</div>
      <div class="desc">Shooter espacial clássico.</div>
      <a href="./games/alien-space-wars/" class="btn">Jogar</a>
    </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "SUA_API_KEY", 
    authDomain: "meuhubdejogos.firebaseapp.com",
    projectId: "meuhubdejogos",
    storageBucket: "meuhubdejogos.firebasestorage.app",
    messagingSenderId: "485191017245",
    appId: "1:485191017245:web:06c2ea7c5aa8f01472b7f4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Seletores
  const btnLogin = document.getElementById('btn-login');
  const dropMenu = document.getElementById('drop-menu');
  const userNameSpan = document.getElementById('user-name');
  const userPhotoImg = document.getElementById('user-photo');
  const menuUserHello = document.getElementById('menu-user-hello');
  const cards = document.querySelectorAll('.card');

  // --- LÓGICA DE LOGIN ---
  btnLogin.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!auth.currentUser) {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("Erro no login:", error);
      }
    } else {
      dropMenu.classList.toggle('show');
    }
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    signOut(auth).then(() => dropMenu.classList.remove('show'));
  });

  window.onclick = (e) => { if (!btnLogin.contains(e.target)) dropMenu.classList.remove('show'); };

  // --- ESTADO DO USUÁRIO ---
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      userPhotoImg.src = user.photoURL;
      userPhotoImg.style.display = "block";
      
      const userRef = doc(db, "usuarios", user.uid);
      const docSnap = await getDoc(userRef);
      
      let nome = user.displayName.split(' ')[0];
      if (docSnap.exists() && docSnap.data().nickname) nome = docSnap.data().nickname;

      userNameSpan.textContent = nome;
      menuUserHello.textContent = `Olá, ${nome}!`;

      // Se for VIP
      if (docSnap.exists() && docSnap.data().isVip) {
          userNameSpan.classList.add('vip-name');
          menuUserHello.innerHTML = `Olá, ${nome} 💎`;
      }

      atualizarInterfaceFavoritos(docSnap.exists() ? docSnap.data() : {});
    } else {
      resetInterface();
    }
  });

  function resetInterface() {
    userNameSpan.textContent = "Entrar";
    userNameSpan.classList.remove('vip-name');
    userPhotoImg.style.display = "none";
    menuUserHello.textContent = "Olá!";
    document.querySelectorAll('.fav-btn').forEach(b => {
      b.classList.remove('active');
      b.innerHTML = '🤍';
    });
  }

  // --- FAVORITOS ---
  cards.forEach(card => {
    const gameId = card.dataset.id;
    if(card.classList.contains('futuro-jogo')) return;

    const favBtn = document.createElement('button');
    favBtn.className = 'fav-btn';
    favBtn.innerHTML = '🤍';
    card.insertBefore(favBtn, card.querySelector('.btn'));

    favBtn.onclick = async () => {
      if(!auth.currentUser) return alert("Faça login para favoritar!");
      
      const isFav = favBtn.classList.toggle('active');
      favBtn.innerHTML = isFav ? '❤️' : '🤍';
      
      await setDoc(doc(db, "usuarios", auth.currentUser.uid), {
        [gameId]: isFav
      }, { merge: true });
    };
  });

  function atualizarInterfaceFavoritos(dados) {
    Object.keys(dados).forEach(id => {
      const card = document.querySelector(`[data-id="${id}"]`);
      if (card) {
        const btn = card.querySelector('.fav-btn');
        if (btn) {
          btn.classList.toggle('active', dados[id]);
          btn.innerHTML = dados[id] ? '❤️' : '🤍';
        }
      }
    });
  }
</script>
</body>
</html>

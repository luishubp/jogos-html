<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub de Jogos</title>
<style>
  /* --- BASE LIMPA E DIRETA --- */
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:sans-serif;
    background:#0f1724;
    color:#e5e7eb;
    padding-top: 80px;
  }

  header{
    position:fixed;top:0;width:100%;
    background:rgba(15,23,36,0.95);
    display:flex;justify-content:space-between;align-items:center;
    padding:15px 20px;
    border-bottom:1px solid #1e293b;
    z-index:1000;
  }

  .menu-buttons{display:flex;align-items:center;gap:10px;}

  button, #btn-login {
    padding:8px 15px; border-radius:8px; border:none; cursor:pointer;
    background:#14b8a6; color:#020617; font-weight:bold;
    display:flex; align-items:center; gap:8px;
  }

  #user-photo { width: 22px; height: 22px; border-radius: 50%; display:none; }

  /* Dropdown simples para não poluir */
  .profile-container { position: relative; }
  .dropdown-content {
    display: none; position: absolute; right: 0; top: 40px;
    background: #111; min-width: 150px; border-radius: 8px;
    border: 1px solid #333; overflow: hidden;
  }
  .dropdown-content.show { display: block; }
  .dropdown-content a, .logout-btn {
    color: #ccc; padding: 10px; text-decoration: none; display: block;
    font-size: 14px; width: 100%; text-align: left; background: none; border: none; cursor: pointer;
  }
  .dropdown-content a:hover { background: #222; }

  .container{ padding: 20px; max-width: 1100px; margin: 0 auto; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }

  .card{
    background:#0b1220; border:1px solid #1e293b;
    border-radius:12px; padding:20px;
    display:flex; flex-direction:column; gap: 10px;
  }

  .fav-btn{ background:none; border:none; cursor:pointer; font-size:1.2rem; color:#444; align-self: flex-start; }
  .fav-btn.active{ color: #f87171; }

  .btn-jogar{
    display:block; text-align:center; padding:10px;
    background:#22d3ee; color:#020617; text-decoration:none;
    border-radius:8px; font-weight:bold;
  }
</style>
</head>
<body>

<header>
  <h3>Hub Jogos</h3>
  <div class="menu-buttons">
    <div class="profile-container">
      <button id="btn-login">
        <img id="user-photo" src="">
        <span id="user-name">Entrar</span>
      </button>
      <div id="drop-menu" class="dropdown-content">
        <a href="https://patreon.com" target="_blank">Patreon</a>
        <a href="https://ko-fi.com" target="_blank">Ko-fi</a>
        <button id="btn-logout" class="logout-btn">Sair</button>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="grid" id="game-grid">
    <div class="card" data-id="game-1">
      <button class="fav-btn">❤</button>
      <h4>Alien Space Wars</h4>
      <p style="font-size: 0.8rem; color: #9ca3af;">Shooter espacial.</p>
      <a href="#" class="btn-jogar">Jogar</a>
    </div>
    
    <div class="card" data-id="game-2">
      <button class="fav-btn">❤</button>
      <h4>Night Watch</h4>
      <p style="font-size: 0.8rem; color: #9ca3af;">Sobreviva à noite.</p>
      <a href="#" class="btn-jogar">Jogar</a>
    </div>
  </div>
</div>

<script type="module">
  // Aqui entra a tua lógica do Firebase (Auth e Firestore) que já configurámos
  // O foco é: Login -> Salva UID -> Libera Favoritos na Nuvem.
  
  const btnLogin = document.getElementById('btn-login');
  const dropMenu = document.getElementById('drop-menu');

  btnLogin.addEventListener('click', () => {
    // Se logado, alterna o menu. Se não, dispara o login.
    dropMenu.classList.toggle('show');
  });

  // Fecha o menu se clicar fora
  window.onclick = (e) => {
    if (!e.target.closest('.profile-container')) dropMenu.classList.remove('show');
  };
</script>

</body>
</html>
